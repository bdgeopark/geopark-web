<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해설사 로그인</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #FEE500; /* 카카오 옐로우 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #191919;
        }
        .login-box {
            background-color: white;
            padding: 50px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 320px;
            text-align: center;
            box-sizing: border-box;
        }
        .title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            font-size: 0.95rem;
            color: #666666;
            margin-bottom: 35px;
            letter-spacing: -0.3px;
        }
        input {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #E5E5E5;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Pretendard', sans-serif;
            box-sizing: border-box;
            background-color: #FAFAFA;
            transition: border 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #FEE500;
            background-color: white;
        }
        .btn-login {
            width: 100%;
            padding: 18px;
            background-color: #3C1E1E; /* 카카오 브라운 */
            color: #FEE500;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            font-family: 'Pretendard', sans-serif;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="title">지질공원 활동일지</div>
        <div class="subtitle">해설사 계정으로 로그인해주세요</div>
        
        <input type="text" id="my_id" placeholder="아이디">
        <input type="password" id="my_pw" placeholder="비밀번호">
        
        <button class="btn-login" onclick="sendLogin()">로그인</button>
    </div>

    <script>
        const savedName = localStorage.getItem("user_name");
        if (savedName) location.href = "main.html";

        async function sendLogin() {
            const id = document.getElementById('my_id').value;
            const pw = document.getElementById('my_pw').value;

            if(!id || !pw) {
                alert("아이디와 비밀번호를 모두 입력해주세요.");
                return;
            }

            try {
                // 👇 여기가 새 주소(railway)로 변경된 부분입니다!
                const res = await fetch('https://geopark-system-production.up.railway.app/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ uid: String(id), upw: String(pw) })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem("user_name", data.name);
                    localStorage.setItem("user_role", data.role);
                    localStorage.setItem("user_island", data.island);
                    location.href = "main.html";
                } else {
                    alert("로그인 실패: 아이디와 비밀번호를 확인해주세요.");
                }
            } catch (error) {
                alert("서버 연결 실패! 인터넷 상태를 확인하세요.");
            }
        }
    </script>
</body>
</html>
