<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>지질공원 테스트</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 100px; }
        input { padding: 10px; margin: 5px; width: 200px; }
        button { padding: 10px 20px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>🔐 신규 시스템 로그인 테스트</h2>
    <input type="text" id="my_id" placeholder="아이디(admin)"> <br>
    <input type="password" id="my_pw" placeholder="비번(1234)"> <br><br>
    <button onclick="sendLogin()">파이썬 서버에 물어보기</button>

    <script>
        // [추가] 페이지가 열리자마자 도장이 있는지 확인합니다.
        const savedName = localStorage.getItem("user_name");
        if (savedName) {
            // 이미 로그인한 적이 있다면 묻지도 따지지도 말고 메인으로 이동!
            location.href = "main.html";
        }
        
        async function sendLogin() {
            const id = document.getElementById('my_id').value;
            const pw = document.getElementById('my_pw').value;

            try {
                // 주소 끝에 /가 붙지 않도록 주의하세요!
                const res = await fetch('https://bdgeopark.onrender.com/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        uid: String(id),  // 문자로 변환해서 전송
                        upw: String(pw)   // 문자로 변환해서 전송
                    })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem("user_name", data.name);
                    localStorage.setItem("user_role", data.role);
                    localStorage.setItem("user_island", data.island);

                    alert(data.name + " 해설사님, 환영합니다!");
                    location.href = "main.html";
                } else {
                    // 서버가 왜 거절했는지 상세 내용을 가져옵니다.
                    const errorData = await res.json();
                    alert("실패 사유: " + JSON.stringify(errorData.detail));
                }

            } catch (error) {
                console.error(error);
                alert("서버 연결 실패! 인터넷 연결이나 주소를 확인하세요.");
            }
        }
    </script>
</body>
</html>
