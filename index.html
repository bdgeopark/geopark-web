<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지질공원 해설사 시스템</title>
    <style>
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f0f4f8; /* 아주 연한 푸른빛 배경 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background-color: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 320px;
            text-align: center;
            box-sizing: border-box;
        }
        .title {
            color: #2c3e50;
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 5px;
            line-height: 1.4;
        }
        .subtitle {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fafafa;
        }
        input:focus {
            outline: none;
            border-color: #27ae60;
            background-color: white;
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            background-color: #27ae60; /* 지질공원 느낌의 초록색 */
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        .btn-login:hover {
            background-color: #219150;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="title">백령·대청 지질공원<br>스마트 일지</div>
        <div class="subtitle">해설사 계정으로 로그인해주세요</div>
        
        <input type="text" id="my_id" placeholder="아이디 (예: admin)">
        <input type="password" id="my_pw" placeholder="비밀번호">
        
        <button class="btn-login" onclick="sendLogin()">로그인</button>
    </div>

    <script>
        // 자동 로그인 체크
        const savedName = localStorage.getItem("user_name");
        if (savedName) {
            location.href = "main.html";
        }

        async function sendLogin() {
            const id = document.getElementById('my_id').value;
            const pw = document.getElementById('my_pw').value;

            if(!id || !pw) {
                alert("아이디와 비밀번호를 모두 입력해주세요.");
                return;
            }

            try {
                const res = await fetch('https://bdgeopark.onrender.com/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ uid: String(id), upw: String(pw) })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem("user_name", data.name);
                    localStorage.setItem("user_role", data.role);
                    localStorage.setItem("user_island", data.island);
                    location.href = "main.html";
                } else {
                    alert("로그인 실패: 아이디와 비밀번호를 확인해주세요.");
                }
            } catch (error) {
                alert("서버 연결 실패! 인터넷 상태를 확인하세요.");
            }
        }
    </script>
</body>
</html>
