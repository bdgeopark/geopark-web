<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지질공원 통합관리 시스템</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <style>
        /* 기본 폰트 사이즈를 html 태그에 설정하여 비율로 커지게 만듦 */
        html { font-size: 16px; }
        body { font-family: 'Pretendard', sans-serif; background-color: #F5F6F8; margin: 0; padding: 1.25rem; color: #191919; box-sizing: border-box; }
        
        .header { background-color: white; padding: 1.5rem 1.25rem; border-radius: 1.25rem; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 1.25rem; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #FEE500; }
        .header-left { display: flex; align-items: center; }
        .profile-icon { width: 3rem; height: 3rem; background-color: #FEE500; border-radius: 1rem; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; margin-right: 1rem; }
        .user-info .name { font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 0.5rem; }
        .user-info .role { font-size: 0.85rem; color: #666; margin-top: 0.25rem; }
        .current-badge { background-color: #3498db; color: white; font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 0.6rem; font-weight: 600; }
        
        /* 글자 크기 조절 버튼 스타일 */
        .font-controls { display: flex; gap: 0.5rem; }
        .font-btn { background: #f8f9fa; border: 1px solid #ddd; padding: 0.5rem 0.8rem; border-radius: 0.5rem; font-weight: 800; color: #333; cursor: pointer; font-size: 1rem; }
        .font-btn:active { background: #e9ecef; }

        .hidden-section { display: none; background-color: white; padding: 1.25rem; border-radius: 1rem; margin-top: 0.6rem; border: 1px solid #EAEAEA; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .menu-card { background-color: white; padding: 1.25rem; border-radius: 1rem; margin-bottom: 0.75rem; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; border: 1px solid #EAEAEA; box-shadow: 0 4px 10px rgba(0,0,0,0.02); font-size: 1.05rem; }
        .form-group { margin-bottom: 1rem; text-align: left; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 0.3rem; color: #333; }
        select, input, textarea { width: 100%; padding: 0.75rem; border: 1px solid #E5E5E5; border-radius: 0.6rem; font-family: 'Pretendard'; box-sizing: border-box; font-size: 1rem; background-color: #FAFAFA; }
        select:disabled { background-color: #EEEEEE; color: #999; }
        
        .btn-act { width: 100%; padding: 1rem; margin-bottom: 0.5rem; border: none; border-radius: 0.75rem; font-weight: 700; font-size: 1.1rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.1s; }
        .btn-act:active { transform: scale(0.98); }
        .btn-in { background-color: #FEE500; color: #191919; }
        .btn-move { background-color: #3498db; color: white; }
        .btn-out { background-color: #EAEAEA; color: #191919; }
        .btn-submit { background-color: #3C1E1E; color: #FEE500; width: 100%; padding: 1rem; border: none; border-radius: 0.75rem; font-weight: 700; margin-top: 0.6rem; cursor: pointer; font-size: 1.05rem; }
        .btn-submit:disabled { background-color: #CCC; cursor: not-allowed; }
        
        .time-text { font-size: 0.85rem; font-weight: 400; margin-top: 0.25rem; opacity: 0.8; }
        .logout { text-align: center; margin-top: 2rem; font-size: 0.9rem; color: #999; text-decoration: underline; cursor: pointer; }
        .time-input-wrap { background-color: #f8f9fa; padding: 0.75rem; border-radius: 0.6rem; margin-bottom: 1rem; border: 1px dashed #ccc; }
        .plan-row { background: white; padding: 1rem; border-radius: 0.75rem; margin-bottom: 1rem; border: 1px solid #E5E5E5; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .plan-date-label { font-size: 1.1rem; font-weight: 800; color: #2c3e50; margin-bottom: 0.6rem; display: flex; justify-content: space-between; border-bottom: 2px solid #FEE500; padding-bottom: 0.3rem; }
        .flex-group { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center;}
        .calc-hours { font-size: 0.9rem; font-weight: bold; color: #27ae60; }
        .calc-hours.over { color: #e74c3c; }

        .approval-header { display:flex; justify-content:space-between; align-items:center; background:white; padding:0.75rem; border-radius:0.75rem; border:1px solid #E5E5E5; margin-bottom:1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .approval-card { display:flex; gap:0.75rem; align-items:flex-start; background:#f9f9f9; border:1px solid #ddd; padding:1rem; border-radius:0.75rem; margin-bottom:0.6rem; }
        .chk-box { width: 1.5rem !important; height: 1.5rem !important; cursor:pointer; flex-shrink: 0; padding: 0; margin-top:0.2rem; }
        .app-content { flex: 1; word-break: keep-all; font-size: 1rem; }
        .app-tag { display:inline-block; padding:0.2rem 0.5rem; border-radius:0.4rem; font-size:0.8rem; font-weight:bold; margin-bottom:0.5rem; }
        .tag-plan { background:#e1f5fe; color:#01579b; }
        .tag-change { background:#fff3e0; color:#e65100; }
        .app-info { line-height:1.5; margin-bottom:0.5rem; color: #333; }
        
        .admin-island-card { background: white; border: 2px solid #2c3e50; border-radius: 0.75rem; margin-bottom: 1.25rem; overflow: hidden; }
        .admin-island-header { background: #2c3e50; color: white; padding: 0.75rem 1rem; font-size: 1.1rem; font-weight: 800; }
        .admin-loc-group { padding: 1rem; border-bottom: 1px solid #ecf0f1; }
        .admin-loc-group:last-child { border-bottom: none; }
        .admin-loc-title { font-weight: 800; color: #2980b9; margin-bottom: 0.6rem; font-size: 1.1rem; }
        .admin-guide-row { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 0.5rem; padding: 0.75rem; margin-bottom: 0.5rem; }
        .admin-guide-name { font-weight: 800; color: #333; margin-bottom: 0.5rem; }
        .admin-time-box { display: flex; flex-direction: column; gap: 0.3rem; font-size: 0.9rem; }
        .admin-time-plan { background: #e1f5fe; padding: 0.4rem 0.6rem; border-radius: 0.4rem; color: #01579b; }
        .admin-time-act { background: #e8f5e9; padding: 0.4rem 0.6rem; border-radius: 0.4rem; color: #1b5e20; }
        .admin-time-none { background: #ffebee; padding: 0.4rem 0.6rem; border-radius: 0.4rem; color: #b71c1c; }
        
        .log-item-card { background: white; border: 1px solid #E5E5E5; padding: 1rem; border-radius: 0.75rem; margin-bottom: 0.6rem; }
        .log-item-header { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 0.5rem; margin-bottom: 0.5rem; }
        .log-item-stats { display: flex; gap: 0.6rem; font-size: 0.9rem; background: #f8f9fa; padding: 0.6rem; border-radius: 0.5rem; margin-bottom: 0.5rem; }
        .log-item-stats div { flex: 1; text-align: center; }
        .log-item-stats b { display: block; color: #b33939; font-size: 1.1rem; }
        
        .stat-table { width: 100%; border-collapse: collapse; margin-bottom: 1.25rem; font-size: 0.95rem; }
        .stat-table th { background-color: #2c3e50; color: white; padding: 0.6rem; border: 1px solid #ddd; }
        .stat-table td { padding: 0.6rem; border: 1px solid #ddd; text-align: center; background: white; }
        .stat-table .t-left { text-align: left; font-weight: bold; background: #f8f9fa; }

        #print_area { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print_area, #print_area * { visibility: visible; }
            #print_area { display: block; position: absolute; left: 0; top: 0; width: 100%; padding: 20px; background: white; }
            @page { size: A4 portrait; margin: 1.5cm; }
            .print-title { text-align: center; font-size: 24px; font-weight: bold; margin-bottom: 20px; color: black; }
            .print-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 30px; }
            .print-table th { background-color: #f2f2f2 !important; -webkit-print-color-adjust: exact; border: 1px solid #000; padding: 8px; color: black; }
            .print-table td { border: 1px solid #000; padding: 8px; text-align: center; color: black; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <div class="profile-icon">👤</div>
            <div class="user-info">
                <div class="name">
                    <span id="name_display">로딩중...</span>
                    <span id="current_loc_badge" class="current-badge">미출근</span>
                </div>
                <div id="role_display" class="role">직책 / 소속</div>
            </div>
        </div>
        <div class="font-controls">
            <button class="font-btn" onclick="changeFontSize(-1)">가-</button>
            <button class="font-btn" onclick="changeFontSize(1)">가+</button>
        </div>
    </div>

    <div id="menu_container"></div>

    <div id="attendance_area" class="hidden-section">
        <div class="form-group"><label>📍 기록할 안내소 선택</label><select id="location_select"></select></div>
        <div class="time-input-wrap">
            <label style="font-size: 0.9rem; font-weight: 600; color:#555; display:block; margin-bottom:5px;">⏱ 기록할 시간 (직접 수정 가능)</label>
            <input type="time" id="action_time_input">
        </div>
        <button class="btn-act btn-in" onclick="sendAction('출근')"><span>🟢 출근하기</span><div id="in_time_display" class="time-text"></div></button>
        <button class="btn-act btn-move" onclick="sendAction('이동')"><span>🔵 이동하기 (장소변경)</span><div id="move_time_display" class="time-text"></div></button>
        <button class="btn-act btn-out" onclick="sendAction('퇴근')"><span>🔴 퇴근하기</span><div id="out_time_display" class="time-text"></div></button>
    </div>

    <div id="log_area" class="hidden-section">
        <div class="form-group"><label>📍 작성할 안내소</label><select id="log_location_select"></select></div>
        <div class="form-group"><label>시간 선택</label><select id="log_time"></select></div>
        <div class="form-group">
            <label>공동해설 여부</label>
            <select id="log_co">
                <option value="X">X (단독해설 - 실적 직접 입력)</option>
                <option value="O">O (공동해설 - 나는 실적 0, 상대가 입력)</option>
            </select>
        </div>
        <div class="form-group" id="co_guide_group" style="display: none;">
            <label>👥 실적을 대신 입력할 동료 선택</label>
            <select id="log_co_guide"><option value="">해설사 확인 중...</option></select>
        </div>
        <div id="stats_group">
            <div class="form-group"><label>탐방객 수 (명)</label><input type="number" id="log_visitors" value="0"></div>
            <div class="form-group"><label>청취자 수 (명)</label><input type="number" id="log_listeners" value="0"></div>
            <div class="form-group"><label>해설 횟수 (회)</label><input type="number" id="log_count" value="0"></div>
        </div>
        <div class="form-group"><label>📝 특이사항</label><textarea id="log_remarks" rows="3" placeholder="기타 전달사항을 입력하세요"></textarea></div>
        <button class="btn-submit" onclick="submitLog()">일지 저장하기</button>
    </div>

    <div id="status_area" class="hidden-section">
        <div class="form-group"><label>📅 조회 날짜 선택</label><input type="date" id="status_date_input" onchange="loadDailyStatus()"></div>
        <div class="form-group">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <label style="margin:0;">📊 조원 활동 현황</label>
                <button onclick="loadDailyStatus()" style="padding:5px 10px; font-size:0.9rem; background:#333; color:white; border:none; border-radius:6px; cursor:pointer;">새로고침 🔄</button>
            </div>
            <div id="status_container"><p style="text-align:center; color:#999; padding:20px;">현황을 불러오는 중...</p></div>
        </div>
    </div>

    <div id="plan_area" class="hidden-section">
        <div class="form-group">
            <label>🗓 작성할 월 / 구분</label>
            <div class="flex-group">
                <select id="plan_month" style="flex:1;"><option value="1">1월</option><option value="2">2월</option><option value="3">3월</option><option value="4">4월</option><option value="5">5월</option><option value="6">6월</option><option value="7">7월</option><option value="8">8월</option><option value="9">9월</option><option value="10">10월</option><option value="11">11월</option><option value="12">12월</option></select>
                <select id="plan_half" style="flex:1.5;"><option value="1">전반기 (1~15일)</option><option value="2">하반기 (16~말일)</option></select>
            </div>
            <button class="btn-act btn-move" style="margin-top:10px; padding:12px; font-size:1.1rem; border-radius:8px;" onclick="generatePlanForm()">📝 15일치 양식 펼치기</button>
        </div>
        <div id="plan_list_container" style="display:none; margin-top:20px; border-top:2px dashed #CCC; padding-top:20px;">
            <div class="time-input-wrap">
                <label style="font-size: 0.95rem; font-weight: 700; color:#333; margin-bottom:5px;">⚙️ 일괄 적용 설정</label>
                <div class="flex-group"><select id="batch_loc" style="flex:1;"></select><select id="batch_start" style="flex:1;"></select><span style="font-weight:bold;">~</span><select id="batch_end" style="flex:1;"></select></div>
                <button onclick="applyBatchSettings()" style="width:100%; margin-top:8px; padding:10px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer; font-size:1.05rem;">전체 일괄 적용하기</button>
            </div>
            <div id="plan_rows"></div>
            <button class="btn-submit" onclick="submitBulkPlan()">🚀 15일치 스케줄 제출하기</button>
        </div>
    </div>

    <div id="change_area" class="hidden-section">
        <div class="form-group"><label>📅 변경 대상 날짜</label><input type="date" id="change_target_date"></div>
        <div class="form-group">
            <label>⚙️ 변경 유형</label>
            <select id="change_type" onchange="updateChangeUI()">
                <option value="시간 변경">시간 변경</option>
                <option value="해설사 변경(대타)">해설사 변경 (대타 요청)</option>
                <option value="계획 취소">계획 취소 (휴무 전환)</option>
            </select>
        </div>
        <div id="change_ui_time" class="time-input-wrap">
            <label style="font-size: 0.9rem; font-weight: 600;">새로운 시간 설정</label>
            <div class="flex-group" style="margin-top: 5px;"><select id="change_time_start" style="flex:1;"></select><span style="font-weight:bold;">~</span><select id="change_time_end" style="flex:1;"></select></div>
        </div>
        <div id="change_ui_guide" class="time-input-wrap" style="display:none;">
            <label style="font-size: 0.9rem; font-weight: 600;">대타를 요청할 동료 해설사</label>
            <select id="change_target_guide" style="margin-top: 5px;"><option value="">불러오는 중...</option></select>
        </div>
        <div id="change_ui_cancel" class="time-input-wrap" style="display:none;"><label style="font-size: 0.9rem; font-weight: 600; color:#e74c3c;">해당 일자 계획을 취소하고 휴무로 전환합니다.</label></div>
        <div class="form-group"><label>📝 변경 사유</label><textarea id="change_remarks" rows="2" placeholder="변경 사유를 간략히 적어주세요"></textarea></div>
        <button class="btn-submit" onclick="submitPlanChange()">승인 요청하기</button>
    </div>

    <div id="my_plan_area" class="hidden-section">
        <div class="form-group"><label>📋 내가 제출한 활동계획 (최근 30일)</label><div id="my_plan_container"><p style="text-align:center; color:#999; padding:20px;">불러오는 중...</p></div></div>
    </div>

    <div id="approval_area" class="hidden-section">
        <div class="form-group">
            <label>📁 조원 결재함 (승인 대기 목록)</label>
            <div id="approval_header" class="approval-header" style="display:none;">
                <label style="cursor:pointer; display:flex; align-items:center; gap:8px; font-weight:bold;"><input type="checkbox" id="chk_all" class="chk-box" onclick="toggleAllApprovals(this)"> 전체 선택</label>
                <div style="display:flex; gap:5px;"><button class="btn-act btn-in" style="padding:8px 12px; font-size:1rem; border-radius:6px; font-weight:bold; margin:0;" onclick="processBulkApp('승인완료')">선택 승인</button><button class="btn-act btn-out" style="padding:8px 12px; font-size:1rem; border-radius:6px; font-weight:bold; margin:0;" onclick="processBulkApp('반려')">선택 반려</button></div>
            </div>
            <div id="pending_container"><p style="text-align:center; color:#999; padding:20px;">대기 중인 요청을 불러오는 중...</p></div>
        </div>
    </div>

    <div id="team_plan_area" class="hidden-section">
        <div class="form-group">
            <label>🔍 검색 조건 설정</label>
            <div class="flex-group">
                <select id="tp_month" style="flex:1;"><option value="1">1월</option><option value="2">2월</option><option value="3">3월</option><option value="4">4월</option><option value="5">5월</option><option value="6">6월</option><option value="7">7월</option><option value="8">8월</option><option value="9">9월</option><option value="10">10월</option><option value="11">11월</option><option value="12">12월</option></select>
                <select id="tp_half" style="flex:1.5;"><option value="all">전체 일정</option><option value="1">전반기 (1~15일)</option><option value="2">하반기 (16~말일)</option></select>
            </div>
            <div class="flex-group"><select id="tp_loc" style="flex:1;"></select><input type="text" id="tp_name" placeholder="이름 검색" style="flex:1;"></div>
            <button class="btn-submit" style="margin-top:5px; background-color:#3498db; color:white; border-radius:8px;" onclick="loadTeamPlans()">검색하기</button>
        </div>
        <div id="team_plan_container"><p style="text-align:center; color:#999; padding:20px;">조건을 설정하고 검색 버튼을 눌러주세요.</p></div>
    </div>

    <div id="report_area" class="hidden-section">
        <div class="form-group">
            <label>📑 출력할 보고서 선택</label>
            <select id="rep_type" style="margin-bottom:10px;">
                <option value="plan">활동계획서</option>
                <option value="result">활동결과보고서</option>
                <option value="log">안내소 운영일지</option>
            </select>
            <div class="flex-group">
                <select id="rep_year" style="flex:1;">
                    <option value="2025">2025년</option><option value="2026" selected>2026년</option><option value="2027">2027년</option>
                </select>
                <select id="rep_month" style="flex:1;"><option value="1">1월</option><option value="2">2월</option><option value="3">3월</option><option value="4">4월</option><option value="5">5월</option><option value="6">6월</option><option value="7">7월</option><option value="8">8월</option><option value="9">9월</option><option value="10">10월</option><option value="11">11월</option><option value="12">12월</option></select>
            </div>
            <select id="rep_half" style="margin-top:8px;">
                <option value="1">전반기 (1~15일)</option>
                <option value="2">하반기 (16~말일)</option>
            </select>
            <button class="btn-submit" style="margin-top:15px; background-color:#2c3e50; color:white; border-radius:8px; font-size:1.1rem; padding:15px;" onclick="generatePDF()">📄 PDF 변환 및 인쇄</button>
            <p style="font-size:0.9rem; color:#666; text-align:center; margin-top:10px;">버튼을 누르면 인쇄 창이 뜹니다. 'PDF로 저장'을 선택하세요.</p>
        </div>
    </div>

    <div id="admin_attendance_area" class="hidden-section">
        <div class="form-group"><label>📅 조회 날짜 선택</label><input type="date" id="admin_date_input" onchange="loadAdminAttendance()"></div>
        <div class="form-group">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <label style="margin:0;">📊 전 지역 출퇴근 종합 현황</label>
                <button onclick="loadAdminAttendance()" style="padding:5px 10px; font-size:0.9rem; background:#333; color:white; border:none; border-radius:6px; cursor:pointer;">새로고침 🔄</button>
            </div>

                <select id="ap_loc" style="flex:1;"><option value="">- 모든 안내소 -</option></select>

        <div id="admin_plan_container"><p style="text-align:center; color:#999; padding:20px;">조건을 설정하고 검색 버튼을 눌러주세요.</p></div>

        <div class="form-group">
            <label>📊 통계 기준월 선택</label>
            <div class="flex-group">
                <select id="stat_year" style="flex:1;"><option value="2025">2025년</option><option value="2026" selected>2026년</option><option value="2027">2027년</option></select>
                <select id="stat_month" style="flex:1;"><option value="1">1월</option><option value="2">2월</option><option value="3">3월</option><option value="4">4월</option><option value="5">5월</option><option value="6">6월</option><option value="7">7월</option><option value="8">8월</option><option value="9">9월</option><option value="10">10월</option><option value="11">11월</option><option value="12">12월</option></select>

        <div id="stat_container"><p style="text-align:center; color:#999; padding:20px;">연도와 월을 선택하고 버튼을 눌러주세요.</p></div>

    <div id="print_area"></div>

    <script>
        // --- [신규 추가] 글자 크기 조절 기능 ---
        let baseFontSize = parseInt(localStorage.getItem("font_size")) || 16;
        document.documentElement.style.fontSize = baseFontSize + 'px';
        
        function changeFontSize(step) {
            baseFontSize += step * 2; // 2px 단위로 조절
            if (baseFontSize < 12) baseFontSize = 12; // 최소 크기
            if (baseFontSize > 24) baseFontSize = 24; // 최대 크기
            document.documentElement.style.fontSize = baseFontSize + 'px';
            localStorage.setItem("font_size", baseFontSize);
        }

        const API_BASE = "https://geopark-system-production.up.railway.app"; 
        
        const userName = localStorage.getItem("user_name");
        const userRole = localStorage.getItem("user_role");
        const userIsland = localStorage.getItem("user_island");
        let currentLoc = localStorage.getItem("current_location") || "미출근";

        if (!userName) location.href = "index.html";
        document.getElementById('name_display').innerText = userName + " 님";
        document.getElementById('role_display').innerText = `[${userRole}] ${userIsland || '관리자'}`;
        
        function updateCurrentLocBadge() {
            if(userRole === '관리자') { document.getElementById('current_loc_badge').style.display = 'none'; return; }
            const badge = document.getElementById('current_loc_badge');
            badge.innerText = currentLoc;
            badge.style.backgroundColor = currentLoc === "미출근" ? "#95a5a6" : "#3498db";
        }
        updateCurrentLocBadge();

        const locSelect = document.getElementById('location_select');
        const logLocSelect = document.getElementById('log_location_select');
        const batchLocSelect = document.getElementById('batch_loc');
        
        let myLocations = [];
        if (userIsland && userIsland.includes('백령')) myLocations = ['백령센터', '두무진', '용틀임바위', '진촌리 현무암', '콩돌해안', '사곶해변', '용기포신항'];
        else if (userIsland && userIsland.includes('대청')) myLocations = ['선진동', '서풍받이', '농여해변', '옥죽동 해안사구'];
        else if (userIsland && userIsland.includes('소청')) myLocations = ['탑동', '분바위'];
        else myLocations = ['거점센터'];
        
        let allLocations = ['백령센터', '두무진', '용틀임바위', '진촌리 현무암', '콩돌해안', '사곶해변', '용기포신항', '선진동', '서풍받이', '농여해변', '옥죽동 해안사구', '탑동', '분바위', '거점센터'];

        let locOptionsHtml = `<option value="휴무">-휴무-</option>` + myLocations.map(l => `<option value="${l}">${l}</option>`).join('');
        if(locSelect) { myLocations.forEach(loc => { locSelect.add(new Option(loc, loc)); logLocSelect.add(new Option(loc, loc)); }); }
        if(batchLocSelect) batchLocSelect.innerHTML = locOptionsHtml;

        if(document.getElementById('tp_loc')) document.getElementById('tp_loc').innerHTML = `<option value="">- 모든 안내소 -</option>` + myLocations.map(l => `<option value="${l}">${l}</option>`).join('');
        if(document.getElementById('al_loc')) document.getElementById('al_loc').innerHTML = `<option value="">- 모든 안내소 -</option>` + allLocations.map(l => `<option value="${l}">${l}</option>`).join('');

        const currentMonth = (new Date().getMonth() + 1).toString();
        if(document.getElementById('plan_month')) document.getElementById('plan_month').value = currentMonth;
        if(document.getElementById('tp_month')) document.getElementById('tp_month').value = currentMonth;
        if(document.getElementById('ap_month')) document.getElementById('ap_month').value = currentMonth;
        if(document.getElementById('stat_month')) document.getElementById('stat_month').value = currentMonth;
        if(document.getElementById('rep_month')) document.getElementById('rep_month').value = currentMonth;

        if(document.getElementById('al_start_date')) {
            const now = new Date(); const offset = now.getTimezoneOffset() * 60000;
            const dateOffset = new Date(now.getTime() - offset).toISOString().split('T')[0];
            document.getElementById('al_start_date').value = dateOffset;
            document.getElementById('al_end_date').value = dateOffset;
        }

        function updateApLoc() {
            const island = document.getElementById('ap_island').value;
            let locs = [];
            if (island === '백령도') locs = ['백령센터', '두무진', '용틀임바위', '진촌리 현무암', '콩돌해안', '사곶해변', '용기포신항'];
            else if (island === '대청도') locs = ['선진동', '서풍받이', '농여해변', '옥죽동 해안사구'];
            else if (island === '소청도') locs = ['탑동', '분바위'];
            else locs = allLocations;
            document.getElementById('ap_loc').innerHTML = `<option value="">- 모든 안내소 -</option>` + locs.map(l => `<option value="${l}">${l}</option>`).join('');
        }
        updateApLoc();

        function setCurrentTimeInput() {
            const now = new Date();
            document.getElementById('action_time_input').value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        }

        const logTime = document.getElementById('log_time');
        if(logTime) {
            for(let i=6; i<=19; i++) {
                let start = i < 10 ? '0'+i : i; let end = (i+1) < 10 ? '0'+(i+1) : (i+1);
                logTime.add(new Option(`${start}:00 ~ ${end}:00`, `${start}:00 ~ ${end}:00`));
            }
        }

        let timeOptionsHtml = '';
        for(let i=6; i<=20; i++) { let h = i < 10 ? '0'+i : i; timeOptionsHtml += `<option value="${h}:00">${h}:00</option>`; }
        if(document.getElementById('batch_start')) {
            document.getElementById('batch_start').innerHTML = timeOptionsHtml; document.getElementById('batch_end').innerHTML = timeOptionsHtml;
            document.getElementById('batch_start').value = "08:00"; document.getElementById('batch_end').value = "17:00";
            document.getElementById('change_time_start').innerHTML = timeOptionsHtml; document.getElementById('change_time_end').innerHTML = timeOptionsHtml;
        }

        // --- [수정] 방어 코드가 적용된 날짜 숫자 추출 함수 ---
        function getDayNum(rawDate) {
            if (!rawDate) return 0;
            let dateStr = String(rawDate); // 무조건 글자로 변환해서 뻗는 현상 방지
            let m = dateStr.match(/(\d+)일/);
            if (m) return parseInt(m[1]);
            let parts = dateStr.split('-');
            if (parts.length >= 3) return parseInt(parts[2]);
            return 0;
        }

        const menuData = {
            '해설사': ['1. 출퇴근관리', '2. 안내소 운영일지 작성', '3. 활동계획서 작성', '4. 활동계획 변경', '5. 나의 활동계획 조회'],
            '조장': ['1. 출퇴근관리', '2. 안내소 운영일지 작성', '3. 출퇴근 및 활동 현황 조회', '4. 활동계획서 작성', '5. 활동계획 변경', '6. 활동계획 및 변경 승인', '7. 나의 활동계획 조회', '8. 조원 활동계획 조회', '9. 보고서 출력 (PDF)'],
            '관리자': ['1. 해설사 출퇴근 현황', '2. 해설사 활동 현황', '3. 활동계획서 조회', '4. 통계']
        };

        const container = document.getElementById('menu_container');
        (menuData[userRole] || menuData['해설사']).forEach(m => {
            const d = document.createElement('div');
            d.className = 'menu-card'; d.innerText = m;
            d.onclick = () => {
                document.getElementById('attendance_area').style.display = m.includes('출퇴근관리') && userRole !== '관리자' ? 'block' : 'none';
                document.getElementById('log_area').style.display = m.includes('운영일지 작성') ? 'block' : 'none';
                document.getElementById('plan_area').style.display = m.includes('활동계획서 작성') ? 'block' : 'none';
                document.getElementById('change_area').style.display = m.includes('활동계획 변경') ? 'block' : 'none';
                document.getElementById('approval_area').style.display = m.includes('변경 승인') ? 'block' : 'none';
                document.getElementById('my_plan_area').style.display = m.includes('나의 활동계획 조회') ? 'block' : 'none';
                document.getElementById('status_area').style.display = m.includes('현황 조회') && !m.includes('나의') && userRole !== '관리자' ? 'block' : 'none';
                document.getElementById('team_plan_area').style.display = m.includes('조원 활동계획 조회') ? 'block' : 'none';
                document.getElementById('report_area').style.display = m.includes('보고서 출력') ? 'block' : 'none';
                
                document.getElementById('admin_attendance_area').style.display = m === '1. 해설사 출퇴근 현황' ? 'block' : 'none';
                document.getElementById('admin_log_area').style.display = m === '2. 해설사 활동 현황' ? 'block' : 'none';
                document.getElementById('admin_plan_area').style.display = m === '3. 활동계획서 조회' ? 'block' : 'none';
                document.getElementById('admin_stats_area').style.display = m === '4. 통계' ? 'block' : 'none';

                if(m.includes('출퇴근관리') && userRole !== '관리자') setCurrentTimeInput();
                if(m.includes('활동계획 변경')) loadGuideList(); 
                if(m.includes('변경 승인')) loadPendingRequests(); 
                if(m.includes('나의 활동계획 조회')) loadMyPlans(); 
                if(m.includes('조원 활동계획 조회')) loadTeamPlans(); 
                if(m.includes('현황 조회') && !m.includes('나의') && userRole !== '관리자') {
                    if(!document.getElementById('status_date_input').value) {
                        const now = new Date(); const offset = now.getTimezoneOffset() * 60000;
                        const dateOffset = new Date(now.getTime() - offset);
                        document.getElementById('status_date_input').value = dateOffset.toISOString().split('T')[0];
                    }
                    loadDailyStatus(); 
                }
                
                if(m === '1. 해설사 출퇴근 현황') {
                    if(!document.getElementById('admin_date_input').value) {
                        const now = new Date(); const offset = now.getTimezoneOffset() * 60000;
                        const dateOffset = new Date(now.getTime() - offset);
                        document.getElementById('admin_date_input').value = dateOffset.toISOString().split('T')[0];
                    }
                    loadAdminAttendance();
                }
                if(m === '2. 해설사 활동 현황') loadAdminLogs(); 
                if(m === '3. 활동계획서 조회') loadAdminPlans();
                if(m === '4. 통계') loadStatistics();
            };
            container.appendChild(d);
        });

        async function syncMyStatus() {
            if(userRole === '관리자') return;
            try {
                const res = await fetch(`${API_BASE}/get_my_attendance?name=${encodeURIComponent(userName)}`);
                if(res.ok) {
                    const data = await res.json();
                    currentLoc = data.loc;
                    localStorage.setItem("current_location", currentLoc);
                    updateCurrentLocBadge();
                    if(data.in_time) { localStorage.setItem("last_in_time", data.in_time); document.getElementById('in_time_display').innerText = `기록됨: ${data.in_time}`; } else { document.getElementById('in_time_display').innerText = ''; }
                    if(data.out_time) { localStorage.setItem("last_out_time", data.out_time); document.getElementById('out_time_display').innerText = `기록됨: ${data.out_time}`; } else { document.getElementById('out_time_display').innerText = ''; }
                }
            } catch (e) {}
        }

        async function sendAction(action) {
            const loc = document.getElementById('location_select').value;
            const inputTime = document.getElementById('action_time_input').value; 
            if(!inputTime) return;
            if(!confirm(`[${inputTime}] 기준으로 [${loc}]에서 [${action}] 기록하시겠습니까?`)) return;
            try {
                const res = await fetch(`${API_BASE}/record`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name: userName, island: userIsland, role: userRole, action: action, location: loc, action_time: inputTime })
                });
                if(res.ok) {
                    if (action === '출근' || action === '이동') { currentLoc = loc; localStorage.setItem("current_location", loc); updateCurrentLocBadge(); } 
                    else if (action === '퇴근') { currentLoc = "미출근"; localStorage.setItem("current_location", "미출근"); updateCurrentLocBadge(); }
                    if (action === '출근') { localStorage.setItem("last_in_time", inputTime); document.getElementById('in_time_display').innerText = `기록됨: ${inputTime}`; }
                    else if (action === '이동') { localStorage.setItem("last_move_time", inputTime); document.getElementById('move_time_display').innerText = `기록됨: ${inputTime}`; }
                    else if (action === '퇴근') { localStorage.setItem("last_out_time", inputTime); document.getElementById('out_time_display').innerText = `기록됨: ${inputTime}`; }
                    alert(action + " 완료!");
                } else alert("기록 실패!");
            } catch (e) {}
        }

        async function submitLog() {
            const coSelectValue = document.getElementById('log_co').value;
            const isCoInitiator = coSelectValue === 'O'; let coCommentaryValue = isCoInitiator ? document.getElementById('log_co_guide').value : (coSelectValue === '○' ? '○' : 'X');
            if (isCoInitiator && (!coCommentaryValue || coCommentaryValue.includes("없다"))) { alert("선택 가능한 공동해설자가 없습니다."); return; }
            if(!confirm("운영일지를 저장하시겠습니까?")) return;
            try {
                const res = await fetch(`${API_BASE}/log_operation`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name: userName, island: userIsland, role: userRole, log_location: document.getElementById('log_location_select').value, target_time: document.getElementById('log_time').value, visitors: isCoInitiator ? 0 : parseInt(document.getElementById('log_visitors').value), listeners: isCoInitiator ? 0 : parseInt(document.getElementById('log_listeners').value), count: isCoInitiator ? 0 : parseInt(document.getElementById('log_count').value), co_commentary: coCommentaryValue, remarks: document.getElementById('log_remarks').value })
                });
                if(res.ok) { alert("저장되었습니다."); document.getElementById('log_area').style.display = 'none'; document.getElementById('log_visitors').value = 0; document.getElementById('log_listeners').value = 0; document.getElementById('log_count').value = 0; document.getElementById('log_remarks').value = ""; } else alert("저장 실패");
            } catch (e) {}
        }

        async function loadDailyStatus() {
            const container = document.getElementById('status_container');
            const targetDate = document.getElementById('status_date_input').value;
            container.innerHTML = '<p style="text-align:center; color:#999;">데이터를 불러오는 중입니다...</p>';
            try {
                const res = await fetch(`${API_BASE}/get_daily_status?island=${encodeURIComponent(userIsland)}&target_date=${targetDate}`);
                const data = await res.json();
                let html = ''; let summary = data.log_summary;
                html += `<div style="background:#fff3e0; padding:15px; border-radius:12px; margin-bottom:15px; border:1px solid #ffe0b2;"><div style="font-size:1.05rem; font-weight:800; color:#e65100; margin-bottom:10px;">📝 ${data.target_date} 실적 총합 (일지 ${summary.total_logs}건)</div><div style="display:flex; justify-content:space-between; text-align:center;"><div style="flex:1;"><div style="font-size:0.9rem; color:#d35400;">탐방객</div><div style="font-weight:800; font-size:1.2rem; color:#b33939;">${summary.total_visitors}명</div></div><div style="flex:1;"><div style="font-size:0.9rem; color:#d35400;">청취자</div><div style="font-weight:800; font-size:1.2rem; color:#b33939;">${summary.total_listeners}명</div></div><div style="flex:1;"><div style="font-size:0.9rem; color:#d35400;">해설횟수</div><div style="font-weight:800; font-size:1.2rem; color:#b33939;">${summary.total_count}회</div></div></div></div>`;
                if(Object.keys(data.attendance).length === 0) { html += `<p style="text-align:center; color:#999; padding:20px;">${data.target_date}에 기록된 활동이 없습니다.</p>`; } else {
                    for (const [loc, users] of Object.entries(data.attendance)) {
                        let headerColor = loc === '퇴근' ? '#95a5a6' : '#3498db';
                        html += `<div style="background:white; border: 1px solid #E5E5E5; border-radius: 12px; margin-bottom: 12px; overflow:hidden;"><div style="background:${headerColor}; color:white; padding:8px 15px; font-weight:bold; font-size:1.05rem;">📍 ${loc} (${users.length}명)</div><div style="padding:10px 15px;">`;
                        users.forEach(u => { 
                            let outStr = u.out_time ? u.out_time : '<span style="color:#e74c3c;">미퇴근</span>';
                            html += `<div style="margin-bottom:12px; border-bottom:1px dashed #eee; padding-bottom:10px;"><div style="font-weight:800; color:#333; margin-bottom:6px;">${u.name}</div><div style="display:flex; justify-content:space-between; font-size:0.95rem; color:#555; background:#f8f9fa; padding:8px; border-radius:6px;"><span>🟢 출근: <b>${u.in_time}</b></span><span>🔴 퇴근: <b>${outStr}</b></span></div></div>`; 
                        });
                        html += `</div></div>`;
                    }

        function calcRowHours(row) {
            const loc = row.querySelector('.p-loc').value; const start = row.querySelector('.p-start').value; const end = row.querySelector('.p-end').value; const hoursSpan = row.querySelector('.calc-hours');
            if (loc === '휴무') { hoursSpan.innerText = "휴무"; hoursSpan.className = "calc-hours"; row.querySelector('.p-start').disabled = true; row.querySelector('.p-end').disabled = true; return; }
            row.querySelector('.p-start').disabled = false; row.querySelector('.p-end').disabled = false;
            let sHour = parseInt(start.split(':')[0]); let eHour = parseInt(end.split(':')[0]); let diff = (eHour - sHour) >= 5 ? (eHour - sHour) - 1 : (eHour - sHour);
            if ((eHour-sHour) <= 0) { hoursSpan.innerText = "시간 오류"; hoursSpan.className = "calc-hours over"; } else { hoursSpan.innerText = `${diff}시간 (식사제외)`; hoursSpan.className = diff > 8 ? "calc-hours over" : "calc-hours"; }

        async function submitBulkPlan() {
            let plans = []; let isValid = true; let totalRestDays = 0; let currentWeekWorkDays = 0; let weekWarningTriggered = false; let requiresApproval = false;
            document.querySelectorAll('.plan-row').forEach(row => {
                let dayIdx = parseInt(row.getAttribute('data-day'));
                let loc = row.querySelector('.p-loc').value; let sTime = row.querySelector('.p-start').value; let eTime = row.querySelector('.p-end').value;
                let rawDiff = parseInt(eTime.split(':')[0]) - parseInt(sTime.split(':')[0]);
                
                if (dayIdx === 0) currentWeekWorkDays = 0;
                if (loc !== '휴무') {
                    if(rawDiff <= 0) isValid = false; 
                    currentWeekWorkDays++;
                    if ((rawDiff >= 5 ? rawDiff-1 : rawDiff) > 8) requiresApproval = true;
                } else { totalRestDays++; }
                if (dayIdx === 6 || row === document.querySelectorAll('.plan-row')[document.querySelectorAll('.plan-row').length - 1]) {
                    if (currentWeekWorkDays >= 7) weekWarningTriggered = true;
                }
                plans.push({ plan_date: row.querySelector('.plan-date-label span').innerText, location: loc === '휴무' ? '-' : loc, activity_status: loc === '휴무' ? '휴무' : `${sTime}~${eTime} (${rawDiff >= 5 ? rawDiff-1 : rawDiff}시간)`, remarks: row.querySelector('.p-remarks').value, status: (loc !== '휴무' && (rawDiff >= 5 ? rawDiff-1 : rawDiff) > 8) ? "초과승인대기" : "승인대기" });
            });
            if (!isValid) { alert("시간 설정이 잘못된 날짜가 있습니다."); return; }
            if (totalRestDays < 5 && !confirm(`경고: 전/하반기 15일 중 5일 이상 휴무가 권장됩니다.\n이대로 제출하시겠습니까?`)) return;
            if (weekWarningTriggered && !confirm(`경고: 일주일 중 최소 1일의 휴무 없이 7일 연속으로 계획된 주가 포함되어 있습니다.\n이대로 제출하시겠습니까?`)) return;
            
            let confirmMsg = `활동계획을 제출하시겠습니까?`;
            if(requiresApproval) confirmMsg += `\n※ 8시간 초과 근무 포함되어 추가 승인이 필요합니다.`;
            
            if(!confirm(confirmMsg)) return;
            try {
                const res = await fetch(`${API_BASE}/submit_plan_bulk`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name: userName, island: userIsland, plans: plans }) });
                if(res.ok) { alert("제출되었습니다."); document.getElementById('plan_list_container').style.display = 'none'; } else alert("제출 실패");
            } catch (e) {}
        }

                    if(aDay !== bDay) return aDay - bDay; 
                    if(String(a['섬']||'') !== String(b['섬']||'')) return String(a['섬']||'').localeCompare(String(b['섬']||''));
                    return String(a['이름']||'').localeCompare(String(b['이름']||''));
                });

                let html = '';
                plans.forEach(p => {
                    let statusColor = String(p['상태']||'').includes('승인완료') ? '#27ae60' : (String(p['상태']||'').includes('반려') ? '#e74c3c' : '#f39c12');
                    html += `<div class="approval-card" style="display:block;"><div style="display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding-bottom:8px; margin-bottom:8px;"><strong style="font-size:1.1rem;">${p['날짜']} - ${p['이름']} <span style="font-size:0.9rem; color:#7f8c8d;">(${p['섬']})</span></strong><span style="color:${statusColor}; font-weight:bold; font-size:0.9rem;">${p['상태']}</span></div><div style="font-size:1rem; line-height:1.5; color:#333;">장소: <b>${p['장소']}</b><br>시간: ${p['활동여부']}</div></div>`;
                });
                container.innerHTML = html;
            } catch (e) { container.innerHTML = '<p style="text-align:center; color:#e74c3c;">데이터를 불러오지 못했습니다.</p>'; }
        }

        async function loadStatistics() {
            const container = document.getElementById('stat_container');
            const year = document.getElementById('stat_year').value;
            const month = document.getElementById('stat_month').value;

            container.innerHTML = '<p style="text-align:center; color:#999;">통계 데이터를 계산하는 중입니다...</p>';
            
            try {
                const res = await fetch(`${API_BASE}/get_statistics?year=${year}&month=${month}`);
                const data = await res.json();
                
                if (data.total.count === 0 && data.total.visitors === 0) {
                    container.innerHTML = `<p style="text-align:center; color:#999; padding:20px;">${year}년 ${month}월의 운영일지 데이터가 없습니다.</p>`;
                    return;
                }

                let html = '';
                html += `<div style="background:#e3f2fd; padding:15px; border-radius:12px; margin-bottom:20px; border:1px solid #bbdefb;"><div style="font-size:1.2rem; font-weight:800; color:#1565c0; margin-bottom:10px; text-align:center;">🏆 ${year}년 ${month}월 전체 실적</div><div style="display:flex; justify-content:space-between; text-align:center;"><div style="flex:1;"><div style="font-size:0.9rem; color:#1976d2;">총 탐방객</div><div style="font-weight:800; font-size:1.4rem; color:#0d47a1;">${data.total.visitors.toLocaleString()}명</div></div><div style="flex:1;"><div style="font-size:0.9rem; color:#1976d2;">총 청취자</div><div style="font-weight:800; font-size:1.4rem; color:#0d47a1;">${data.total.listeners.toLocaleString()}명</div></div><div style="flex:1;"><div style="font-size:0.9rem; color:#1976d2;">해설 횟수</div><div style="font-weight:800; font-size:1.4rem; color:#0d47a1;">${data.total.count.toLocaleString()}회</div></div></div></div>`;
                html += `<div style="font-weight:800; font-size:1.1rem; margin-bottom:10px; color:#2c3e50;">🏝️ 권역(섬)별 실적</div><table class="stat-table"><thead><tr><th>권역</th><th>탐방객</th><th>청취자</th><th>해설횟수</th></tr></thead><tbody>`;
                for (const [island, stats] of Object.entries(data.island_stats)) { html += `<tr><td class="t-left" style="font-size:1.05rem;">${island}</td><td style="font-size:1.05rem;">${stats.visitors.toLocaleString()}</td><td style="font-size:1.05rem;">${stats.listeners.toLocaleString()}</td><td style="font-size:1.05rem;">${stats.count.toLocaleString()}</td></tr>`; }
                html += `</tbody></table>`;
                html += `<div style="font-weight:800; font-size:1.1rem; margin-top:25px; margin-bottom:10px; color:#2c3e50;">🧑‍🏫 해설사별 개인 실적</div><table class="stat-table"><thead><tr><th>이름 (소속)</th><th>탐방객</th><th>청취자</th><th>해설횟수</th></tr></thead><tbody>`;
                const sortedGuides = Object.entries(data.guide_stats).sort((a, b) => b[1].count - a[1].count);
                for (const [name, stats] of sortedGuides) { html += `<tr><td class="t-left" style="font-size:1.05rem;">${name}<br><span style="font-weight:normal; font-size:0.85rem; color:#7f8c8d;">${stats.island}</span></td><td style="font-size:1.05rem;">${stats.visitors.toLocaleString()}</td><td style="font-size:1.05rem;">${stats.listeners.toLocaleString()}</td><td style="font-size:1.05rem;"><b>${stats.count.toLocaleString()}</b></td></tr>`; }
                html += `</tbody></table>`;
                container.innerHTML = html;
            } catch (e) { container.innerHTML = '<p style="text-align:center; color:#e74c3c;">통계 산출 중 오류가 발생했습니다.</p>'; }
        }

        async function generatePDF() {
            const type = document.getElementById('rep_type').value;
            const year = document.getElementById('rep_year').value;
            const month = document.getElementById('rep_month').value;
            const half = document.getElementById('rep_half').value;
            
            const btn = document.querySelector('#report_area .btn-submit');
            btn.innerText = "데이터를 불러오는 중...";
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/get_report_data?island=${encodeURIComponent(userIsland)}&year=${year}&month=${month}`);
                if (!res.ok) throw new Error("서버 응답 오류");
                const data = await res.json();
                
                let html = ''; let title = ''; let printArea = document.getElementById('print_area');

                if(type === 'plan') {
                    title = `${year}년 ${month}월 ${userIsland} 활동계획서`;
                    let p = data.plans;
                    p = p.filter(x => { let d = getDayNum(x['날짜']); return half === '1' ? (d >= 1 && d <= 15) : (d > 15); });
                    if(p.length === 0) { alert("해당 기간의 계획서 데이터가 없습니다."); btn.innerText = "📄 PDF 변환 및 인쇄"; btn.disabled = false; return; }
                    html += `<div class="print-title">${title}</div><table class="print-table"><thead><tr><th>날짜</th><th>이름</th><th>장소</th><th>활동여부(시간)</th><th>상태</th></tr></thead><tbody>`;
                    p.sort((a, b) => getDayNum(a['날짜']) - getDayNum(b['날짜']));
                    p.forEach(r => { html += `<tr><td>${r['날짜']||''}</td><td>${r['이름']||''}</td><td>${r['장소']||''}</td><td>${r['활동여부']||''}</td><td>${r['상태']||''}</td></tr>`; });
                    html += `</tbody></table>`;
                } 
                else if(type === 'result') {
                    title = `${year}년 ${month}월 ${userIsland} 활동결과보고서`;
                    let r = data.records; let l = data.logs;
                    r = r.filter(x => { let d = getDayNum(x['날짜']); return half === '1' ? (d >= 1 && d <= 15) : (d > 15); });
                    if(r.length === 0) { alert("해당 기간의 활동 기록이 없습니다."); btn.innerText = "📄 PDF 변환 및 인쇄"; btn.disabled = false; return; }
                    html += `<div class="print-title">${title}</div><table class="print-table"><thead><tr><th>날짜</th><th>이름</th><th>장소</th><th>출퇴근 시간</th><th>탐방객</th><th>청취자</th><th>해설</th></tr></thead><tbody>`;
                    r.sort((a, b) => String(a['날짜']||'').localeCompare(String(b['날짜']||'')));
                    r.forEach(rec => {
                        let myLog = l.find(x => x['날짜'] === rec['날짜'] && x['이름'] === rec['이름']);
                        let v = myLog ? myLog['탐방객수'] : '-'; let lis = myLog ? myLog['청취자수'] : '-'; let cnt = myLog ? myLog['해설횟수'] : '-';
                        html += `<tr><td>${rec['날짜']||''}</td><td>${rec['이름']||''}</td><td>${rec['장소']||''}</td><td>${rec['출근시간']||''} ~ ${rec['퇴근시간']||'미퇴근'}</td><td>${v}</td><td>${lis}</td><td>${cnt}</td></tr>`;
                    });
                    html += `</tbody></table>`;
                }
                else if(type === 'log') {
                    title = `${year}년 ${month}월 ${userIsland} 안내소 운영일지`;
                    let l = data.logs;
                    l = l.filter(x => { let d = getDayNum(x['날짜']); return half === '1' ? (d >= 1 && d <= 15) : (d > 15); });
                    if(l.length === 0) { alert("해당 기간의 운영일지 기록이 없습니다."); btn.innerText = "📄 PDF 변환 및 인쇄"; btn.disabled = false; return; }
                    html += `<div class="print-title">${title}</div><table class="print-table"><thead><tr><th>날짜</th><th>안내소</th><th>이름</th><th>시간</th><th>탐방객</th><th>청취자</th><th>특이사항</th></tr></thead><tbody>`;
                    l.sort((a, b) => String(a['날짜']||'').localeCompare(String(b['날짜']||'')));
                    l.forEach(log => {
                        let loc = log['안내소'] || log['장소'] || '';
                        html += `<tr><td>${log['날짜']||''}</td><td>${loc}</td><td>${log['이름']||''}</td><td>${log['시간'] || ''}</td><td>${log['탐방객수']||'0'}</td><td>${log['청취자수']||'0'}</td><td>${log['특이사항']||''}</td></tr>`;
                    });
                    html += `</tbody></table>`;
                }

                printArea.innerHTML = html;
                btn.innerText = "📄 PDF 변환 및 인쇄";
                btn.disabled = false;
                
                window.print();
                
            } catch(e) {
                alert("보고서 생성 중 오류가 발생했습니다. (데이터 형식을 확인해주세요)");
                btn.innerText = "📄 PDF 변환 및 인쇄";
                btn.disabled = false;
            }
        }

        function logout() { if(confirm("로그아웃 하시겠습니까?")) { localStorage.clear(); location.href = "index.html"; } }

        syncMyStatus();
    </script>
</body>
