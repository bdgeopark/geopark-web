<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>활동일지 기록</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #F5F6F8;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #191919;
        }
        .main-box {
            background-color: white;
            padding: 45px 30px;
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 320px;
            text-align: center;
            box-sizing: border-box;
            border-top: 6px solid #FEE500;
        }
        .profile-img {
            width: 65px;
            height: 65px;
            background-color: #FEE500;
            border-radius: 24px;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
        }
        .greeting {
            font-size: 1.4rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
        }
        .island-badge {
            display: inline-block;
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 30px;
            margin-top: 5px;
            font-weight: 500;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-family: 'Pretendard', sans-serif;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .btn:active { transform: scale(0.97); }
        
        .btn-text { font-size: 1.15rem; font-weight: 700; }
        .time-text { font-size: 0.85rem; margin-top: 4px; font-weight: 400; opacity: 0.8; }

        .btn-in { background-color: #FEE500; color: #191919; }
        .btn-out { background-color: #F2F2F2; color: #191919; }

        .logout {
            margin-top: 35px;
            font-size: 0.85rem;
            color: #999;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="main-box">
        <div class="profile-img">🧑‍🌾</div>
        <div id="name_display" class="greeting">해설사님</div>
        <div id="island_display" class="island-badge">소속 섬</div>

        <div class="btn-group">
            <button class="btn btn-in" onclick="sendAction('출근')">
                <span class="btn-text">출근하기</span>
                <span id="in_time_display" class="time-text"></span>
            </button>
            
            <button class="btn btn-out" onclick="sendAction('퇴근')">
                <span class="btn-text">퇴근하기</span>
                <span id="out_time_display" class="time-text"></span>
            </button>
        </div>

        <div class="logout" onclick="logout()">로그아웃</div>
    </div>

    <script>
        const userName = localStorage.getItem("user_name");
        const userIsland = localStorage.getItem("user_island");

        // 페이지 로드 시 정보 표시 및 저장된 시간 불러오기
        if (!userName) {
            location.href = "index.html";
        } else {
            document.getElementById('name_display').innerHTML = `${userName} <span style="font-weight:400;">해설사님</span>`;
            document.getElementById('island_display').innerText = `📍 ${userIsland} 거점센터`;
            
            // 기존에 저장된 출퇴근 시간이 있다면 표시
            const savedInTime = localStorage.getItem("last_in_time");
            const savedOutTime = localStorage.getItem("last_out_time");
            if (savedInTime) document.getElementById('in_time_display').innerText = `기록됨: ${savedInTime}`;
            if (savedOutTime) document.getElementById('out_time_display').innerText = `기록됨: ${savedOutTime}`;
        }

        async function sendAction(type) {
            const role = localStorage.getItem("user_role");
            if (!confirm(`${userName} 해설사님, [${type}] 기록하시겠습니까?`)) return;

            try {
                const res = await fetch('https://bdgeopark.onrender.com/record', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: userName,
                        island: userIsland,
                        role: role,
                        action: type
                    })
                });

                if (res.ok) {
                    // 현재 시간을 포맷팅 (예: 오후 02:30)
                    const now = new Date();
                    const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

                    if (type === '출근') {
                        localStorage.setItem("last_in_time", timeStr);
                        document.getElementById('in_time_display').innerText = `기록됨: ${timeStr}`;
                    } else {
                        localStorage.setItem("last_out_time", timeStr);
                        document.getElementById('out_time_display').innerText = `기록됨: ${timeStr}`;
                    }

                    alert(`${type} 기록이 완료되었습니다! (${timeStr})`);
                } else {
                    alert("기록 실패! 다시 시도해 주세요.");
                }
            } catch (error) {
                alert("인터넷 연결을 확인해 주세요.");
            }
        }

        function logout() {
            if(confirm("로그아웃 하시겠습니까?")) {
                localStorage.clear();
                location.href = "index.html";
            }
        }
    </script>
</body>
</html>
