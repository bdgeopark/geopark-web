<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지질공원 통합관리 시스템</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #F5F6F8; margin: 0; padding: 20px; color: #191919; box-sizing: border-box; }
        .header { background-color: white; padding: 25px 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 20px; display: flex; align-items: center; border-left: 6px solid #FEE500; }
        .profile-icon { width: 50px; height: 50px; background-color: #FEE500; border-radius: 18px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; margin-right: 15px; }
        .user-info .name { font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .user-info .role { font-size: 0.85rem; color: #666; margin-top: 4px; }
        
        /* 현재 안내소 뱃지 스타일 */
        .current-badge { background-color: #3498db; color: white; font-size: 0.75rem; padding: 3px 8px; border-radius: 10px; font-weight: 600; }

        .hidden-section { display: none; background-color: white; padding: 20px; border-radius: 16px; margin-top: 10px; border: 1px solid #EAEAEA; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .menu-card { background-color: white; padding: 20px; border-radius: 16px; margin-bottom: 12px; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; border: 1px solid #EAEAEA; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: #333; }
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #E5E5E5; border-radius: 10px; font-family: 'Pretendard'; box-sizing: border-box; font-size: 1rem; background-color: #FAFAFA; }
        select:disabled { background-color: #EEEEEE; color: #999; }
        
        .btn-act { width: 100%; padding: 15px; margin-bottom: 8px; border: none; border-radius: 12px; font-weight: 700; font-size: 1.1rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.1s; }
        .btn-act:active { transform: scale(0.98); }
        .btn-in { background-color: #FEE500; color: #191919; }
        .btn-move { background-color: #3498db; color: white; }
        .btn-out { background-color: #EAEAEA; color: #191919; }
        .btn-submit { background-color: #3C1E1E; color: #FEE500; width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 700; margin-top: 10px; cursor: pointer; }
        .btn-submit:disabled { background-color: #CCC; cursor: not-allowed; }
        
        .time-text { font-size: 0.8rem; font-weight: 400; margin-top: 4px; opacity: 0.8; }
        .logout { text-align: center; margin-top: 30px; font-size: 0.85rem; color: #999; text-decoration: underline; cursor: pointer; }
        
        #stats_group { transition: all 0.3s; }
        .time-input-wrap { background-color: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px dashed #ccc; }
    </style>
</head>
<body>

    <div class="header">
        <div class="profile-icon">👤</div>
        <div class="user-info">
            <div class="name">
                <span id="name_display">로딩중...</span>
                <span id="current_loc_badge" class="current-badge">미출근</span>
            </div>
            <div id="role_display" class="role">직책 / 소속</div>
        </div>
    </div>

    <div id="menu_container"></div>

    <div id="attendance_area" class="hidden-section">
        <div class="form-group">
            <label>📍 기록할 안내소 선택</label>
            <select id="location_select"></select>
        </div>
        
        <div class="time-input-wrap">
            <label style="font-size: 0.8rem; font-weight: 600; color:#555; display:block; margin-bottom:5px;">⏱ 기록할 시간 (직접 수정 가능)</label>
            <input type="time" id="action_time_input">
        </div>

        <button class="btn-act btn-in" onclick="sendAction('출근')">
            <span>🟢 출근하기</span><div id="in_time_display" class="time-text"></div>
        </button>
        <button class="btn-act btn-move" onclick="sendAction('이동')">
            <span>🔵 이동하기 (장소변경)</span><div id="move_time_display" class="time-text"></div>
        </button>
        <button class="btn-act btn-out" onclick="sendAction('퇴근')">
            <span>🔴 퇴근하기</span><div id="out_time_display" class="time-text"></div>
        </button>
    </div>

    <div id="log_area" class="hidden-section">
        <div class="form-group">
            <label>📍 작성할 안내소</label>
            <select id="log_location_select"></select>
        </div>

        <div class="form-group">
            <label>시간 선택</label>
            <select id="log_time"></select>
        </div>
        
        <div class="form-group">
            <label>공동해설 여부</label>
            <select id="log_co">
                <option value="X">X (단독해설 - 실적 입력)</option>
                <option value="O">O (공동해설 - 실적 면제)</option>
            </select>
        </div>

        <div class="form-group" id="co_guide_group" style="display: none;">
            <label>👥 공동해설자 선택 (오늘 이 안내소 근무자)</label>
            <select id="log_co_guide">
                <option value="">해설사 확인 중...</option>
            </select>
        </div>

        <div id="stats_group">
            <div class="form-group"><label>탐방객 수 (명)</label><input type="number" id="log_visitors" value="0"></div>
            <div class="form-group"><label>청취자 수 (명)</label><input type="number" id="log_listeners" value="0"></div>
            <div class="form-group"><label>해설 횟수 (회)</label><input type="number" id="log_count" value="0"></div>
        </div>

        <div class="form-group"><label>📝 특이사항</label><textarea id="log_remarks" rows="3" placeholder="기타 전달사항을 입력하세요"></textarea></div>
        <button class="btn-submit" onclick="submitLog()">일지 저장하기</button>
    </div>

    <div class="logout" onclick="logout()">로그아웃</div>

    <script>
        const userName = localStorage.getItem("user_name");
        const userRole = localStorage.getItem("user_role");
        const userIsland = localStorage.getItem("user_island");
        let currentLoc = localStorage.getItem("current_location") || "미출근";

        if (!userName) location.href = "index.html";
        document.getElementById('name_display').innerText = userName + " 님";
        document.getElementById('role_display').innerText = `[${userRole}] ${userIsland}`;
        
        // 현재 위치 뱃지 업데이트
        function updateCurrentLocBadge() {
            const badge = document.getElementById('current_loc_badge');
            badge.innerText = currentLoc;
            badge.style.backgroundColor = currentLoc === "미출근" ? "#95a5a6" : "#3498db";
        }
        updateCurrentLocBadge();

        if (localStorage.getItem("last_in_time")) document.getElementById('in_time_display').innerText = `기록됨: ${localStorage.getItem("last_in_time")}`;
        if (localStorage.getItem("last_move_time")) document.getElementById('move_time_display').innerText = `기록됨: ${localStorage.getItem("last_move_time")}`;
        if (localStorage.getItem("last_out_time")) document.getElementById('out_time_display').innerText = `기록됨: ${localStorage.getItem("last_out_time")}`;

        // 안내소 목록 생성
        const locSelect = document.getElementById('location_select');
        const logLocSelect = document.getElementById('log_location_select');
        let myLocations = [];
        if (userIsland.includes('백령')) myLocations = ['백령센터', '두무진', '용틀임바위', '진촌리 현무암', '콩돌해안', '사곶해변', '용기포신항'];
        else if (userIsland.includes('대청')) myLocations = ['선진동', '서풍받이', '농여해변', '옥죽동 해안사구'];
        else if (userIsland.includes('소청')) myLocations = ['탑동', '분바위'];
        else myLocations = ['거점센터'];
        
        myLocations.forEach(loc => {
            locSelect.add(new Option(loc, loc));
            logLocSelect.add(new Option(loc, loc));
        });

        // 켜자마자 현재 시간 세팅
        function setCurrentTimeInput() {
            const now = new Date();
            let hh = String(now.getHours()).padStart(2, '0');
            let mm = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('action_time_input').value = `${hh}:${mm}`;
        }

        const logTime = document.getElementById('log_time');
        for(let i=6; i<=19; i++) {
            let start = i < 10 ? '0'+i : i;
            let end = (i+1) < 10 ? '0'+(i+1) : (i+1);
            logTime.add(new Option(`${start}:00 ~ ${end}:00`, `${start}:00 ~ ${end}:00`));
        }

        const menuData = {
            '해설사': ['1. 출퇴근관리', '2. 안내소 운영일지 작성', '3. 활동계획서 작성', '4. 활동계획 변경'],
            '조장': ['1. 출퇴근관리', '2. 안내소 운영일지 작성', '3. 출퇴근 및 활동 현황 조회', '4. 활동계획서 작성', '5. 활동계획 변경', '6. 활동계획 및 변경 승인'],
            '관리자': ['1. 해설사 출퇴근 현황', '2. 해설사 활동 현황', '3. 활동계획 조회', '4. 통계']
        };

        const container = document.getElementById('menu_container');
        (menuData[userRole] || menuData['해설사']).forEach(m => {
            const d = document.createElement('div');
            d.className = 'menu-card'; d.innerText = m;
            d.onclick = () => {
                document.getElementById('attendance_area').style.display = m.includes('1') ? 'block' : 'none';
                document.getElementById('log_area').style.display = m.includes('2') ? 'block' : 'none';
                
                if(m.includes('1')) setCurrentTimeInput(); // 출퇴근 탭 열 때 현재 시간 자동세팅
                if(m.includes('2')) {
                    if(currentLoc !== "미출근") logLocSelect.value = currentLoc; // 기본값을 현재 위치로 세팅
                    checkDuplicateAndLock();
                }
            };
            container.appendChild(d);
        });

        // 중복 확인
        document.getElementById('log_time').addEventListener('change', checkDuplicateAndLock);
        document.getElementById('log_location_select').addEventListener('change', checkDuplicateAndLock);
        document.getElementById('log_co').addEventListener('change', updateCoGuideUI);

        async function checkDuplicateAndLock() {
            const selectedTime = document.getElementById('log_time').value;
            const statsGroup = document.getElementById('stats_group');
            const submitBtn = document.querySelector('.btn-submit');
            const coSelect = document.getElementById('log_co');

            try {
                const res = await fetch(`https://bdgeopark.onrender.com/check_co_status?name=${encodeURIComponent(userName)}&target_time=${encodeURIComponent(selectedTime)}`);
                const data = await res.json();

                if (data.status === 'exists') {
                    coSelect.innerHTML = '<option value="○">○ (공동해설 자동등록됨)</option>';
                    coSelect.disabled = true;
                    statsGroup.style.display = 'none';
                    document.getElementById('co_guide_group').style.display = 'none';
                    submitBtn.disabled = true;
                    submitBtn.innerText = "동료가 이미 공동해설로 기록했습니다";
                } else {
                    if (coSelect.disabled) {
                        coSelect.innerHTML = '<option value="X">X (단독해설 - 실적 입력)</option><option value="O">O (공동해설 - 실적 면제)</option>';
                        coSelect.disabled = false;
                        coSelect.value = "X";
                        submitBtn.disabled = false;
                        submitBtn.innerText = "일지 저장하기";
                    }
                    updateCoGuideUI();
                }
            } catch (e) { console.error("오류", e); }
        }

        async function updateCoGuideUI() {
            const isCo = document.getElementById('log_co').value === 'O';
            document.getElementById('co_guide_group').style.display = isCo ? 'block' : 'none';
            document.getElementById('stats_group').style.display = isCo ? 'none' : 'block';
            
            if (isCo) {
                const loc = document.getElementById('log_location_select').value;
                const coGuideSelect = document.getElementById('log_co_guide');
                coGuideSelect.innerHTML = '<option value="">동료 해설사 확인 중...</option>';
                
                try {
                    // 퇴근 여부 상관없이, 오늘 하루 해당 안내소에 기록이 있는 사람 모두 불러옴
                    const res = await fetch(`https://bdgeopark.onrender.com/active_guides?location=${encodeURIComponent(loc)}&name=${encodeURIComponent(userName)}`);
                    if(res.ok) {
                        const data = await res.json();
                        if(data.guides && data.guides.length > 0) {
                            coGuideSelect.innerHTML = data.guides.map(g => `<option value="${g}">${g} 해설사</option>`).join('');
                        } else {
                            coGuideSelect.innerHTML = '<option value="">오늘 이 안내소에 기록된 다른 해설사가 없습니다.</option>';
                        }
                    }
                } catch (e) { coGuideSelect.innerHTML = '<option value="">오류 발생</option>'; }
            }
        }

        async function sendAction(action) {
            const loc = document.getElementById('location_select').value;
            const inputTime = document.getElementById('action_time_input').value; // 사용자가 직접 쓴 시간
            
            if(!inputTime) { alert("시간을 입력해 주세요!"); return; }
            if(!confirm(`[${inputTime}] 기준으로 [${loc}]에서 [${action}] 기록하시겠습니까?`)) return;

            try {
                const res = await fetch('https://bdgeopark.onrender.com/record', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name: userName, island: userIsland, role: userRole, action: action, location: loc, action_time: inputTime })
                });
                
                if(res.ok) {
                    if (action === '출근' || action === '이동') {
                        currentLoc = loc;
                        localStorage.setItem("current_location", loc);
                        updateCurrentLocBadge();
                    } else if (action === '퇴근') {
                        currentLoc = "미출근";
                        localStorage.setItem("current_location", "미출근");
                        updateCurrentLocBadge();
                    }

                    if (action === '출근') { localStorage.setItem("last_in_time", inputTime); document.getElementById('in_time_display').innerText = `기록됨: ${inputTime}`; }
                    else if (action === '이동') { localStorage.setItem("last_move_time", inputTime); document.getElementById('move_time_display').innerText = `기록됨: ${inputTime}`; }
                    else if (action === '퇴근') { localStorage.setItem("last_out_time", inputTime); document.getElementById('out_time_display').innerText = `기록됨: ${inputTime}`; }
                    alert(action + " 완료!");
                } else alert("기록 실패!");
            } catch (e) { alert("서버 연결 오류"); }
        }

        async function submitLog() {
            const isCo = document.getElementById('log_co').value === 'O';
            const coCommentaryValue = isCo ? document.getElementById('log_co_guide').value : document.getElementById('log_co').value;

            if (isCo && (!coCommentaryValue || coCommentaryValue.includes("없습니다") || coCommentaryValue.includes("오류"))) {
                alert("선택 가능한 공동해설자가 없습니다. 단독해설(X)로 변경해주세요.");
                return;
            }

            if(!confirm("운영일지를 저장하시겠습니까?")) return;

            const finalVisitors = isCo ? 0 : parseInt(document.getElementById('log_visitors').value);
            const finalListeners = isCo ? 0 : parseInt(document.getElementById('log_listeners').value);
            const finalCount = isCo ? 0 : parseInt(document.getElementById('log_count').value);

            try {
                const res = await fetch('https://bdgeopark.onrender.com/log_operation', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: userName, island: userIsland, role: userRole,
                        log_location: document.getElementById('log_location_select').value,
                        target_time: document.getElementById('log_time').value,
                        visitors: finalVisitors,
                        listeners: finalListeners,
                        count: finalCount,
                        co_commentary: coCommentaryValue,
                        remarks: document.getElementById('log_remarks').value
                    })
                });
                if(res.ok) { 
                    alert("저장되었습니다."); 
                    document.getElementById('log_area').style.display = 'none'; 
                    document.getElementById('log_visitors').value = 0;
                    document.getElementById('log_listeners').value = 0;
                    document.getElementById('log_count').value = 0;
                    document.getElementById('log_remarks').value = "";
                } else alert("저장 실패");
            } catch (e) { alert("서버 연결 오류"); }
        }

        function logout() {
            if(confirm("로그아웃 하시겠습니까?")) { localStorage.clear(); location.href = "index.html"; }
        }
    </script>
</body>
</html>
