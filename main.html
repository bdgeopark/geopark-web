<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지질공원 통합관리 시스템</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #F5F6F8; margin: 0; padding: 20px; color: #191919; box-sizing: border-box; }
        .header { background-color: white; padding: 25px 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 20px; display: flex; align-items: center; border-left: 6px solid #FEE500; }
        .profile-icon { width: 50px; height: 50px; background-color: #FEE500; border-radius: 18px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; margin-right: 15px; }
        .user-info .name { font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .user-info .role { font-size: 0.85rem; color: #666; margin-top: 4px; }
        .current-badge { background-color: #3498db; color: white; font-size: 0.75rem; padding: 3px 8px; border-radius: 10px; font-weight: 600; }
        .hidden-section { display: none; background-color: white; padding: 20px; border-radius: 16px; margin-top: 10px; border: 1px solid #EAEAEA; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .menu-card { background-color: white; padding: 20px; border-radius: 16px; margin-bottom: 12px; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; border: 1px solid #EAEAEA; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: #333; }
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #E5E5E5; border-radius: 10px; font-family: 'Pretendard'; box-sizing: border-box; font-size: 1rem; background-color: #FAFAFA; }
        select:disabled { background-color: #EEEEEE; color: #999; }
        .btn-act { width: 100%; padding: 15px; margin-bottom: 8px; border: none; border-radius: 12px; font-weight: 700; font-size: 1.1rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.1s; }
        .btn-act:active { transform: scale(0.98); }
        .btn-in { background-color: #FEE500; color: #191919; }
        .btn-move { background-color: #3498db; color: white; }
        .btn-out { background-color: #EAEAEA; color: #191919; }
        .btn-submit { background-color: #3C1E1E; color: #FEE500; width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 700; margin-top: 10px; cursor: pointer; }
        .btn-submit:disabled { background-color: #CCC; cursor: not-allowed; }
        .time-text { font-size: 0.8rem; font-weight: 400; margin-top: 4px; opacity: 0.8; }
        .logout { text-align: center; margin-top: 30px; font-size: 0.85rem; color: #999; text-decoration: underline; cursor: pointer; }
        .time-input-wrap { background-color: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px dashed #ccc; }
        
        .plan-row { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #E5E5E5; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .plan-date-label { font-size: 1.05rem; font-weight: 800; color: #2c3e50; margin-bottom: 10px; display: flex; justify-content: space-between; border-bottom: 2px solid #FEE500; padding-bottom: 5px; }
        .flex-group { display: flex; gap: 8px; margin-bottom: 8px; align-items: center;}
        .calc-hours { font-size: 0.85rem; font-weight: bold; color: #27ae60; }
        .calc-hours.over { color: #e74c3c; }
    </style>
</head>
<body>

    <div class="header">
        <div class="profile-icon">👤</div>
        <div class="user-info">
            <div class="name">
                <span id="name_display">로딩중...</span>
                <span id="current_loc_badge" class="current-badge">미출근</span>
            </div>
            <div id="role_display" class="role">직책 / 소속</div>
        </div>
    </div>

    <div id="menu_container"></div>

    <div id="attendance_area" class="hidden-section">
        <div class="form-group"><label>📍 기록할 안내소 선택</label><select id="location_select"></select></div>
        <div class="time-input-wrap">
            <label style="font-size: 0.8rem; font-weight: 600; color:#555; display:block; margin-bottom:5px;">⏱ 기록할 시간 (직접 수정 가능)</label>
            <input type="time" id="action_time_input">
        </div>
        <button class="btn-act btn-in" onclick="sendAction('출근')"><span>🟢 출근하기</span><div id="in_time_display" class="time-text"></div></button>
        <button class="btn-act btn-move" onclick="sendAction('이동')"><span>🔵 이동하기 (장소변경)</span><div id="move_time_display" class="time-text"></div></button>
        <button class="btn-act btn-out" onclick="sendAction('퇴근')"><span>🔴 퇴근하기</span><div id="out_time_display" class="time-text"></div></button>
    </div>

    <div id="log_area" class="hidden-section">
        <div class="form-group"><label>📍 작성할 안내소</label><select id="log_location_select"></select></div>
        <div class="form-group"><label>시간 선택</label><select id="log_time"></select></div>
        <div class="form-group">
            <label>공동해설 여부</label>
            <select id="log_co">
                <option value="X">X (단독해설 - 실적 직접 입력)</option>
                <option value="O">O (공동해설 - 나는 실적 0, 상대가 입력)</option>
            </select>
        </div>
        <div class="form-group" id="co_guide_group" style="display: none;">
            <label>👥 실적을 대신 입력할 동료 선택</label>
            <select id="log_co_guide"><option value="">해설사 확인 중...</option></select>
        </div>
        <div id="stats_group">
            <div class="form-group"><label>탐방객 수 (명)</label><input type="number" id="log_visitors" value="0"></div>
            <div class="form-group"><label>청취자 수 (명)</label><input type="number" id="log_listeners" value="0"></div>
            <div class="form-group"><label>해설 횟수 (회)</label><input type="number" id="log_count" value="0"></div>
        </div>
        <div class="form-group"><label>📝 특이사항</label><textarea id="log_remarks" rows="3" placeholder="기타 전달사항을 입력하세요"></textarea></div>
        <button class="btn-submit" onclick="submitLog()">일지 저장하기</button>
    </div>

    <div id="plan_area" class="hidden-section">
        <div class="form-group">
            <label>🗓 작성할 월 / 구분</label>
            <div class="flex-group">
                <select id="plan_month" style="flex:1;">
                    <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option><option value="4">4월</option><option value="5">5월</option><option value="6">6월</option><option value="7">7월</option><option value="8">8월</option><option value="9">9월</option><option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
                </select>
                <select id="plan_half" style="flex:1.5;">
                    <option value="1">전반기 (1~15일)</option>
                    <option value="2">하반기 (16~말일)</option>
                </select>
            </div>
            <button class="btn-act btn-move" style="margin-top:10px; padding:12px; font-size:1rem; border-radius:8px;" onclick="generatePlanForm()">📝 15일치 양식 펼치기</button>
        </div>

        <div id="plan_list_container" style="display:none; margin-top:20px; border-top:2px dashed #CCC; padding-top:20px;">
            <div class="time-input-wrap">
                <label style="font-size: 0.85rem; font-weight: 700; color:#333; margin-bottom:5px;">⚙️ 일괄 적용 설정</label>
                <div class="flex-group">
                    <select id="batch_loc" style="flex:1;"></select>
                    <select id="batch_start" style="flex:1;"></select>
                    <span style="font-weight:bold;">~</span>
                    <select id="batch_end" style="flex:1;"></select>
                </div>
                <button onclick="applyBatchSettings()" style="width:100%; margin-top:8px; padding:10px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;">전체 일괄 적용하기</button>
            </div>

            <div id="plan_rows"></div>
            
            <button class="btn-submit" onclick="submitBulkPlan()">🚀 15일치 스케줄 제출하기</button>
        </div>
    </div>

    <div class="logout" onclick="logout()">로그아웃</div>

    <script>
        const userName = localStorage.getItem("user_name");
        const userRole = localStorage.getItem("user_role");
        const userIsland = localStorage.getItem("user_island");
        let currentLoc = localStorage.getItem("current_location") || "미출근";

        if (!userName) location.href = "index.html";
        document.getElementById('name_display').innerText = userName + " 님";
        document.getElementById('role_display').innerText = `[${userRole}] ${userIsland}`;
        
        function updateCurrentLocBadge() {
            const badge = document.getElementById('current_loc_badge');
            badge.innerText = currentLoc;
            badge.style.backgroundColor = currentLoc === "미출근" ? "#95a5a6" : "#3498db";
        }
        updateCurrentLocBadge();

        if (localStorage.getItem("last_in_time")) document.getElementById('in_time_display').innerText = `기록됨: ${localStorage.getItem("last_in_time")}`;
        if (localStorage.getItem("last_move_time")) document.getElementById('move_time_display').innerText = `기록됨: ${localStorage.getItem("last_move_time")}`;
        if (localStorage.getItem("last_out_time")) document.getElementById('out_time_display').innerText = `기록됨: ${localStorage.getItem("last_out_time")}`;

        const locSelect = document.getElementById('location_select');
        const logLocSelect = document.getElementById('log_location_select');
        const batchLocSelect = document.getElementById('batch_loc');
        
        let myLocations = [];
        if (userIsland.includes('백령')) myLocations = ['백령센터', '두무진', '용틀임바위', '진촌리 현무암', '콩돌해안', '사곶해변', '용기포신항'];
        else if (userIsland.includes('대청')) myLocations = ['선진동', '서풍받이', '농여해변', '옥죽동 해안사구'];
        else if (userIsland.includes('소청')) myLocations = ['탑동', '분바위'];
        else myLocations = ['거점센터'];
        
        let locOptionsHtml = `<option value="휴무">-휴무-</option>` + myLocations.map(l => `<option value="${l}">${l}</option>`).join('');

        myLocations.forEach(loc => {
            locSelect.add(new Option(loc, loc));
            logLocSelect.add(new Option(loc, loc));
        });
        batchLocSelect.innerHTML = locOptionsHtml;

        document.getElementById('plan_month').value = (new Date().getMonth() + 1).toString();

        function setCurrentTimeInput() {
            const now = new Date();
            document.getElementById('action_time_input').value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        }

        const logTime = document.getElementById('log_time');
        for(let i=6; i<=19; i++) {
            let start = i < 10 ? '0'+i : i;
            let end = (i+1) < 10 ? '0'+(i+1) : (i+1);
            logTime.add(new Option(`${start}:00 ~ ${end}:00`, `${start}:00 ~ ${end}:00`));
        }

        let timeOptionsHtml = '';
        for(let i=6; i<=20; i++) {
            let h = i < 10 ? '0'+i : i;
            timeOptionsHtml += `<option value="${h}:00">${h}:00</option>`;
        }
        document.getElementById('batch_start').innerHTML = timeOptionsHtml;
        document.getElementById('batch_end').innerHTML = timeOptionsHtml;
        // 기본 세팅을 08시 ~ 17시 (순수 8시간) 로 잡아둠
        document.getElementById('batch_start').value = "08:00";
        document.getElementById('batch_end').value = "17:00";

        const menuData = {
            '해설사': ['1. 출퇴근관리', '2. 안내소 운영일지 작성', '3. 활동계획서 작성', '4. 활동계획 변경'],
            '조장': ['1. 출퇴근관리', '2. 안내소 운영일지 작성', '3. 출퇴근 및 활동 현황 조회', '4. 활동계획서 작성', '5. 활동계획 변경', '6. 활동계획 및 변경 승인'],
            '관리자': ['1. 해설사 출퇴근 현황', '2. 해설사 활동 현황', '3. 활동계획 조회', '4. 통계']
        };

        const container = document.getElementById('menu_container');
        (menuData[userRole] || menuData['해설사']).forEach(m => {
            const d = document.createElement('div');
            d.className = 'menu-card'; d.innerText = m;
            d.onclick = () => {
                document.getElementById('attendance_area').style.display = m.includes('출퇴근관리') ? 'block' : 'none';
                document.getElementById('log_area').style.display = m.includes('운영일지 작성') ? 'block' : 'none';
                document.getElementById('plan_area').style.display = m.includes('활동계획서 작성') ? 'block' : 'none';
                
                if(m.includes('출퇴근관리')) setCurrentTimeInput();
            };
            container.appendChild(d);
        });

        async function sendAction(action) {
            const loc = document.getElementById('location_select').value;
            const inputTime = document.getElementById('action_time_input').value; 
            if(!inputTime) return;
            if(!confirm(`[${inputTime}] 기준으로 [${loc}]에서 [${action}] 기록하겠는가?`)) return;

            try {
                const res = await fetch('https://bdgeopark.onrender.com/record', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name: userName, island: userIsland, role: userRole, action: action, location: loc, action_time: inputTime })
                });
                if(res.ok) {
                    if (action === '출근' || action === '이동') { currentLoc = loc; localStorage.setItem("current_location", loc); updateCurrentLocBadge(); } 
                    else if (action === '퇴근') { currentLoc = "미출근"; localStorage.setItem("current_location", "미출근"); updateCurrentLocBadge(); }
                    if (action === '출근') { localStorage.setItem("last_in_time", inputTime); document.getElementById('in_time_display').innerText = `기록됨: ${inputTime}`; }
                    else if (action === '이동') { localStorage.setItem("last_move_time", inputTime); document.getElementById('move_time_display').innerText = `기록됨: ${inputTime}`; }
                    else if (action === '퇴근') { localStorage.setItem("last_out_time", inputTime); document.getElementById('out_time_display').innerText = `기록됨: ${inputTime}`; }
                    alert(action + " 완료!");
                } else alert("기록 실패!");
            } catch (e) {}
        }

        async function submitLog() {
            // 운영일지 제출 로직 (기존 유지)
            const coSelectValue = document.getElementById('log_co').value;
            const isCoInitiator = coSelectValue === 'O'; 
            const isDesignated = coSelectValue === '○'; 
            let coCommentaryValue = "";
            if (isCoInitiator) coCommentaryValue = document.getElementById('log_co_guide').value;
            else if (isDesignated) coCommentaryValue = "○";
            else coCommentaryValue = "X";

            if (isCoInitiator && (!coCommentaryValue || coCommentaryValue.includes("없습니다"))) { alert("선택 가능한 공동해설자가 없다."); return; }
            if(!confirm("운영일지를 저장하겠는가?")) return;

            const finalVisitors = isCoInitiator ? 0 : parseInt(document.getElementById('log_visitors').value);
            const finalListeners = isCoInitiator ? 0 : parseInt(document.getElementById('log_listeners').value);
            const finalCount = isCoInitiator ? 0 : parseInt(document.getElementById('log_count').value);

            try {
                const res = await fetch('https://bdgeopark.onrender.com/log_operation', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: userName, island: userIsland, role: userRole, log_location: document.getElementById('log_location_select').value,
                        target_time: document.getElementById('log_time').value, visitors: finalVisitors, listeners: finalListeners, count: finalCount,
                        co_commentary: coCommentaryValue, remarks: document.getElementById('log_remarks').value
                    })
                });
                if(res.ok) { 
                    alert("저장되었다."); document.getElementById('log_area').style.display = 'none'; 
                    document.getElementById('log_visitors').value = 0; document.getElementById('log_listeners').value = 0; document.getElementById('log_count').value = 0; document.getElementById('log_remarks').value = "";
                } else alert("저장 실패");
            } catch (e) {}
        }

        // --- 15일 일괄 작성 로직 ---
        function generatePlanForm() {
            const month = parseInt(document.getElementById('plan_month').value);
            const half = parseInt(document.getElementById('plan_half').value);
            const year = new Date().getFullYear();
            
            let startDay = half === 1 ? 1 : 16;
            let endDay = half === 1 ? 15 : new Date(year, month, 0).getDate(); 
            
            const container = document.getElementById('plan_rows');
            container.innerHTML = '';
            
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            
            for(let i = startDay; i <= endDay; i++) {
                let d = new Date(year, month-1, i);
                let dayIdx = d.getDay();
                let dateStr = `${month}월 ${i}일(${days[dayIdx]})`;
                let isWeekend = dayIdx === 0 || dayIdx === 6 ? 'color:#e74c3c;' : '';

                let html = `
                    <div class="plan-row" data-date="${year}-${month}-${i}" data-day="${dayIdx}">
                        <div class="plan-date-label">
                            <span style="${isWeekend}">${dateStr}</span>
                            <span class="calc-hours">0시간</span>
                        </div>
                        <div class="flex-group">
                            <select class="p-loc" style="flex:1;" onchange="handleRowChange(this)">${locOptionsHtml}</select>
                            <select class="p-start" style="flex:1;" onchange="handleRowChange(this)">${timeOptionsHtml}</select>
                            <span>~</span>
                            <select class="p-end" style="flex:1;" onchange="handleRowChange(this)">${timeOptionsHtml}</select>
                        </div>
                        <input type="text" class="p-remarks" placeholder="비고 (선택사항)">
                    </div>
                `;
                container.innerHTML += html;
            }
            
            document.getElementById('plan_list_container').style.display = 'block';
            applyBatchSettings(); 
        }

        function applyBatchSettings() {
            const loc = document.getElementById('batch_loc').value;
            const start = document.getElementById('batch_start').value;
            const end = document.getElementById('batch_end').value;

            document.querySelectorAll('.plan-row').forEach(row => {
                row.querySelector('.p-loc').value = loc;
                row.querySelector('.p-start').value = start;
                row.querySelector('.p-end').value = end;
                calcRowHours(row);
            });
        }

        function handleRowChange(elem) {
            calcRowHours(elem.closest('.plan-row'));
        }

        function calcRowHours(row) {
            const loc = row.querySelector('.p-loc').value;
            const start = row.querySelector('.p-start').value;
            const end = row.querySelector('.p-end').value;
            const hoursSpan = row.querySelector('.calc-hours');

            if (loc === '휴무') {
                hoursSpan.innerText = "휴무";
                hoursSpan.className = "calc-hours";
                row.querySelector('.p-start').disabled = true;
                row.querySelector('.p-end').disabled = true;
                return;
            }

            row.querySelector('.p-start').disabled = false;
            row.querySelector('.p-end').disabled = false;

            let sHour = parseInt(start.split(':')[0]);
            let eHour = parseInt(end.split(':')[0]);
            let rawDiff = eHour - sHour;
            let diff = rawDiff;

            // 핵심 로직: 총 시간이 5시간 이상일 때만 식사시간 1시간을 뺀다.
            if (rawDiff >= 5) {
                diff = rawDiff - 1;
            }

            if (rawDiff <= 0) {
                hoursSpan.innerText = "시간 오류";
                hoursSpan.className = "calc-hours over";
            } else {
                hoursSpan.innerText = `${diff}시간 (식사제외)`;
                if (diff > 8) hoursSpan.className = "calc-hours over";
                else hoursSpan.className = "calc-hours";
            }
        }

        async function submitBulkPlan() {
            let plans = [];
            let totalRestDays = 0;
            let isValid = true;
            let requiresApproval = false;
            let currentWeekWorkDays = 0;
            let weekWarningTriggered = false;

            document.querySelectorAll('.plan-row').forEach(row => {
                let dateStr = row.querySelector('.plan-date-label span').innerText;
                let dayIdx = parseInt(row.getAttribute('data-day'));
                let loc = row.querySelector('.p-loc').value;
                let sTime = row.querySelector('.p-start').value;
                let eTime = row.querySelector('.p-end').value;
                let remarks = row.querySelector('.p-remarks').value;
                
                if (dayIdx === 0) currentWeekWorkDays = 0;

                let activityStatus = "";
                let statusStr = "대기중";

                if (loc === '휴무') {
                    activityStatus = "휴무";
                    totalRestDays++;
                } else {
                    let rawDiff = parseInt(eTime.split(':')[0]) - parseInt(sTime.split(':')[0]);
                    if (rawDiff <= 0) { alert(`${dateStr}의 시간이 잘못되었다.`); isValid = false; }
                    
                    let diff = rawDiff >= 5 ? rawDiff - 1 : rawDiff;
                    
                    activityStatus = `${sTime}~${eTime} (${diff}시간)`;
                    currentWeekWorkDays++;
                    
                    if (diff > 8) {
                        statusStr = "초과승인대기";
                        requiresApproval = true;
                    }
                }

                if (dayIdx === 6 || row === document.querySelectorAll('.plan-row')[document.querySelectorAll('.plan-row').length - 1]) {
                    if (currentWeekWorkDays >= 7) weekWarningTriggered = true;
                }
                
                plans.push({
                    plan_date: dateStr,
                    location: loc === '휴무' ? '-' : loc,
                    activity_status: activityStatus,
                    remarks: remarks,
                    status: statusStr
                });
            });

            if (!isValid) return;

            if (totalRestDays < 5) {
                if(!confirm(`경고: 전/하반기 15일 중 5일 이상 휴무가 권장된다. (현재 ${totalRestDays}일 휴무)\n\n이대로 제출하겠는가?`)) return;
            }

            if (weekWarningTriggered) {
                if(!confirm(`경고: 일주일(일~토) 중 최소 1일의 휴무 없이 7일 연속으로 계획된 주가 포함되어 있다.\n\n이대로 제출하겠는가?`)) return;
            }

            let confirmMsg = `총 ${plans.length}일치의 활동계획을 제출하겠는가?`;
            if (requiresApproval) confirmMsg += `\n\n※ 주의: 8시간을 초과하는 근무가 포함되어 조장 승인이 추가로 필요하다.`;

            if(!confirm(confirmMsg)) return;

            try {
                const res = await fetch('https://bdgeopark.onrender.com/submit_plan_bulk', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name: userName, island: userIsland, plans: plans })
                });
                
                if(res.ok) {
                    alert("활동계획서 일괄 제출이 완료되었다.");
                    document.getElementById('plan_list_container').style.display = 'none';
                } else { alert("제출에 실패했다."); }
            } catch (e) { alert("서버 연결 오류"); }
        }

        function logout() {
            if(confirm("로그아웃 하겠는가?")) { localStorage.clear(); location.href = "index.html"; }
        }
    </script>
</body>
</html>
