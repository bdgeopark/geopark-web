<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>활동일지 기록</title>
    <style>
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .main-box {
            background-color: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 320px;
            text-align: center;
            box-sizing: border-box;
        }
        .header {
            margin-bottom: 35px;
        }
        .island-badge {
            display: inline-block;
            background-color: #3498db; /* 바다 느낌의 파란색 */
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .greeting {
            color: #2c3e50;
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            padding: 20px;
            border: none;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, background-color 0.2s;
        }
        .btn:active {
            transform: scale(0.96); /* 누를 때 살짝 들어가는 효과 */
        }
        .btn-in { background-color: #27ae60; }
        .btn-in:hover { background-color: #219150; }
        
        .btn-out { background-color: #e74c3c; }
        .btn-out:hover { background-color: #c0392b; }

        .logout {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #95a5a6;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="main-box">
        <div class="header">
            <span id="island_display" class="island-badge">소속 섬</span>
            <div id="name_display" class="greeting">해설사님<br>환영합니다</div>
        </div>

        <div class="btn-group">
            <button class="btn btn-in" onclick="sendAction('출근')">🟢 출근하기</button>
            <button class="btn btn-out" onclick="sendAction('퇴근')">🔴 퇴근하기</button>
        </div>

        <div class="logout" onclick="logout()">다른 계정으로 로그인 (로그아웃)</div>
    </div>

    <script>
        // 페이지 열리자마자 사용자 정보 세팅
        const userName = localStorage.getItem("user_name");
        const userIsland = localStorage.getItem("user_island");

        if (!userName) {
            alert("로그인 정보가 없습니다.");
            location.href = "index.html";
        } else {
            document.getElementById('name_display').innerHTML = `<span style="color:#27ae60;">${userName}</span> 해설사님`;
            document.getElementById('island_display').innerText = userIsland;
        }

        async function sendAction(type) {
            const role = localStorage.getItem("user_role");

            if (!confirm(`${userName} 해설사님, [${type}] 기록하시겠습니까?`)) return;

            try {
                const res = await fetch('https://bdgeopark.onrender.com/record', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: userName,
                        island: userIsland,
                        role: role,
                        action: type
                    })
                });

                if (res.ok) {
                    alert(`${type} 기록이 정상적으로 완료되었습니다!`);
                } else {
                    const err = await res.json();
                    alert("기록 실패: " + JSON.stringify(err.detail));
                }
            } catch (error) {
                alert("서버 연결 실패! 인터넷 상태를 확인해 주세요.");
            }
        }

        // 로그아웃 기능
        function logout() {
            if(confirm("로그아웃 하시겠습니까?")) {
                localStorage.clear(); // 저장된 도장 지우기
                location.href = "index.html";
            }
        }
    </script>
</body>
</html>
