<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지질공원 통합관리 시스템</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #F5F6F8; margin: 0; padding: 20px; color: #191919; box-sizing: border-box; }
        .header { background-color: white; padding: 25px 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 20px; display: flex; align-items: center; border-left: 6px solid #FEE500; }
        .profile-icon { width: 50px; height: 50px; background-color: #FEE500; border-radius: 18px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; margin-right: 15px; }
        .user-info .name { font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .user-info .role { font-size: 0.85rem; color: #666; margin-top: 4px; }
        .current-badge { background-color: #3498db; color: white; font-size: 0.75rem; padding: 3px 8px; border-radius: 10px; font-weight: 600; }
        .hidden-section { display: none; background-color: white; padding: 20px; border-radius: 16px; margin-top: 10px; border: 1px solid #EAEAEA; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .menu-card { background-color: white; padding: 20px; border-radius: 16px; margin-bottom: 12px; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; border: 1px solid #EAEAEA; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: #333; }
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #E5E5E5; border-radius: 10px; font-family: 'Pretendard'; box-sizing: border-box; font-size: 1rem; background-color: #FAFAFA; }
        select:disabled { background-color: #EEEEEE; color: #999; }
        .btn-act { width: 100%; padding: 15px; margin-bottom: 8px; border: none; border-radius: 12px; font-weight: 700; font-size: 1.1rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.1s; }
        .btn-act:active { transform: scale(0.98); }
        .btn-in { background-color: #FEE500; color: #191919; }
        .btn-move { background-color: #3498db; color: white; }
        .btn-out { background-color: #EAEAEA; color: #191919; }
        .btn-submit { background-color: #3C1E1E; color: #FEE500; width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 700; margin-top: 10px; cursor: pointer; }
        .btn-submit:disabled { background-color: #CCC; cursor: not-allowed; }
        .time-text { font-size: 0.8rem; font-weight: 400; margin-top: 4px; opacity: 0.8; }
        .logout { text-align: center; margin-top: 30px; font-size: 0.85rem; color: #999; text-decoration: underline; cursor: pointer; }
        .time-input-wrap { background-color: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px dashed #ccc; }
        .plan-row { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #E5E5E5; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .plan-date-label { font-size: 1.05rem; font-weight: 800; color: #2c3e50; margin-bottom: 10px; display: flex; justify-content: space-between; border-bottom: 2px solid #FEE500; padding-bottom: 5px; }
        .flex-group { display: flex; gap: 8px; margin-bottom: 8px; align-items: center;}
        .calc-hours { font-size: 0.85rem; font-weight: bold; color: #27ae60; }
        .calc-hours.over { color: #e74c3c; }
        .approval-header { display:flex; justify-content:space-between; align-items:center; background:white; padding:12px; border-radius:12px; border:1px solid #E5E5E5; margin-bottom:15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .approval-card { display:flex; gap:12px; align-items:flex-start; background:#f9f9f9; border:1px solid #ddd; padding:15px; border-radius:12px; margin-bottom:10px; }
        .chk-box { width: 20px !important; height: 20px !important; transform: scale(1.3); margin-top:5px; cursor:pointer; flex-shrink: 0; padding: 0; }
        .app-content { flex: 1; word-break: keep-all; }
        .app-tag { display:inline-block; padding:3px 8px; border-radius:6px; font-size:0.75rem; font-weight:bold; margin-bottom:8px; }
        .tag-plan { background:#e1f5fe; color:#01579b; }
        .tag-change { background:#fff3e0; color:#e65100; }
        .app-info { font-size:0.95rem; line-height:1.5; margin-bottom:8px; color: #333; }
        .admin-island-card { background: white; border: 2px solid #2c3e50; border-radius: 12px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .admin-island-header { background: #2c3e50; color: white; padding: 12px 15px; font-size: 1.1rem; font-weight: 800; }
        .admin-loc-group { padding: 15px; border-bottom: 1px solid #ecf0f1; }
        .admin-loc-group:last-child { border-bottom: none; }
        .admin-loc-title { font-weight: 800; color: #2980b9; margin-bottom: 10px; font-size: 1.05rem; display:flex; align-items:center; gap:5px; }
        .admin-guide-row { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
        .admin-guide-name { font-weight: 800; font-size: 1rem; color: #333; margin-bottom: 8px; }
        .admin-time-box { display: flex; flex-direction: column; gap: 5px; font-size: 0.85rem; }
        .admin-time-plan { background: #e1f5fe; padding: 6px 10px; border-radius: 6px; color: #01579b; }
        .admin-time-act { background: #e8f5e9; padding: 6px 10px; border-radius: 6px; color: #1b5e20; }
        .admin-time-none { background: #ffebee; padding: 6px 10px; border-radius: 6px; color: #b71c1c; }
        .log-item-card { background: white; border: 1px solid #E5E5E5; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .log-item-header { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 8px; }
        .log-item-stats { display: flex; gap: 10px; font-size: 0.85rem; background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 8px; }
        .log-item-stats div { flex: 1; text-align: center; }
        .log-item-stats b { display: block; color: #b33939; font-size: 1rem; }
        .stat-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.9rem; }
        .stat-table th { background-color: #2c3e50; color: white; padding: 10px; border: 1px solid #ddd; }
        .stat-table td { padding: 10px; border: 1px solid #ddd; text-align: center; background: white; }
        .stat-table .t-left { text-align: left; font-weight: bold; background: #f8f9fa; }

        /* --- [완전 개편 2탄] 매의 눈 맞춤형 서식 복제 --- */
        #print_area { display: none; }
        @media print {
            body * { visibility: hidden; }
            html, body { width: 100%; height: auto; margin: 0; padding: 0; background: white; }
            #print_area, #print_area * { visibility: visible; }
            
            @page { size: A4 portrait; margin: 15mm; }
            
            #print_area { 
                display: block; position: absolute; left: 0; top: 0; width: 100%; background: white; 
                font-family: 'Batang', 'BatangChe', '바탕', '바탕체', serif !important; 
                color: #000; box-sizing: border-box; 
            }
            
            .print-page { 
                position: relative; width: 100%; page-break-after: always; background: white; margin: 0; 
            }
            
            .print-top-left { font-size: 11pt; font-weight: bold; margin-bottom: 3mm; }
            .print-main-title { text-align: center; font-size: 24pt; font-weight: 900; margin-bottom: 2mm; letter-spacing: 5px; }
            .print-date { text-align: center; font-size: 11pt; margin-bottom: 5mm; }

            /* 표 레이아웃 절대 고정 */
            table.fixed-table { 
                width: 100%; border-collapse: collapse; border: 2px solid #000; 
                table-layout: fixed; text-align: center; font-size: 11pt; height: max-content;
            }
            table.fixed-table th, table.fixed-table td { 
                border: 1px solid #000; padding: 2px 4px; overflow: hidden; vertical-align: middle;
            }
            table.fixed-table th { font-weight: bold; background-color: #f7f7f7 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

            /* 1. 안내소 지시사항 두 배로 확대 / 2. 성명, 활동시간 날씬하게 압축 */
            .t1-col1 { width: 15%; }
            .t1-col2 { width: 25%; }
            .t1-col3 { width: 15%; }
            .t1-col4 { width: 45%; }
            
            .row-loc th, .row-loc td { height: 16mm !important; } /* 지시사항 행 2배 뚱뚱하게 */
            .row-guide-header th { height: 6mm !important; padding: 1px !important; font-size: 10pt; } /* 성명/활동시간 행 초슬림화 */
            .row-guide td { height: 7mm !important; padding: 1px !important; }

            .print-sub-title { font-size: 12pt; font-weight: bold; margin: 5mm 0 2mm 0; text-align: left; }

            /* 하단 운영일지 */
            .t2-col1 { width: 16%; }
            .t2-col2 { width: 14%; }
            .t2-col3 { width: 14%; }
            .t2-col4 { width: 14%; }
            .t2-col5 { width: 14%; }
            .t2-col6 { width: 14%; }
            .t2-col7 { width: 14%; }

            .row-log-header th { height: 10mm !important; padding: 2px !important; }
            .row-log td { height: 7mm !important; padding: 2px !important; }
            .row-sum th, .row-sum td { height: 7mm !important; padding: 2px !important; font-weight: bold; }
            
            /* 3. 특이사항 높이 1줄로 확 줄임 */
            .row-remark th, .row-remark td { height: 8mm !important; padding: 2px !important; vertical-align: middle !important; white-space: nowrap; overflow: hidden; text-align: left !important; padding-left: 5px !important;}

            /* 4. 서명란 황금 간격 세팅 (우측에서 5mm 띄움) */
            .signature-box { 
                text-align: right; 
                margin-top: 8mm; 
                padding-right: 5mm; 
                font-size: 13pt; 
                font-weight: bold;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="profile-icon">👤</div>
        <div class="user-info">
            <div class="name">
                <span id="name_display">로딩중...</span>
                <span id="current_loc_badge" class="current-badge">미출근</span>
            </div>
            <div id="role_display" class="role">직책 / 소속</div>
        </div>
    </div>

    <div id="menu_container"></div>

    <div id="attendance_area" class="hidden-section">
        <div class="form-group"><label>📍 기록할 안내소 선택</label><select id="location_select"></select></div>
        <div class="time-input-wrap"><label style="font-size: 0.8rem; font-weight: 600; color:#555; display:block; margin-bottom:5px;">⏱ 기록할 시간 (직접 수정 가능)</label><input type="time" id="action_time_input"></div>
        <button class="btn-act btn-in" onclick="sendAction('출근')"><span>🟢 출근하기</span><div id="in_time_display" class="time-text"></div></button>
        <button class="btn-act btn-move" onclick="sendAction('이동')"><span>🔵 이동하기 (장소변경)</span><div id="move_time_display" class="time-text"></div></button>
        <button class="btn-act btn-out" onclick="sendAction('퇴근')"><span>🔴 퇴근하기</span><div id="out_time_display" class="time-text"></div></button>
    </div>

    <div id="log_area" class="hidden-section">
        <div class="form-group"><label>📍 작성할 안내소</label><select id="log_location_select"></select></div>
        <div class="form-group"><label>시간 선택</label><select id="log_time"></select></div>
        <div class="form-group"><label>공동해설 여부</label><select id="log_co"><option value="X">X (단독해설)</option><option value="O">O (공동해설)</option></select></div>
        <div class="form-group" id="co_guide_group" style="display: none;"><label>👥 동료 선택</label><select id="log_co_guide"><option value="">확인 중...</option></select></div>
        <div id="stats_group">
            <div class="form-group"><label>탐방객 수 (명)</label><input type="number" id="log_visitors" value="0"></div>
            <div class="form-group"><label>청취자 수 (명)</label><input type="number" id="log_listeners" value="0"></div>
            <div class="form-group"><label>해설 횟수 (회)</label><input type="number" id="log_count" value="0"></div>
        </div>
        <div class="form-group"><label>📝 특이사항</label><textarea id="log_remarks" rows="3"></textarea></div>
        <button class="btn-submit" onclick="submitLog()">일지 저장하기</button>
    </div>

    <div id="status_area" class="hidden-section">
        <div class="form-group"><label>📅 날짜 선택</label><input type="date" id="status_date_input" onchange="loadDailyStatus()"></div>
        <div class="form-group"><button onclick="loadDailyStatus()" style="padding:5px 10px; background:#333; color:white; border-radius:6px; cursor:pointer;">새로고침 🔄</button>
            <div id="status_container"><p style="text-align:center; color:#999; padding:20px;">불러오는 중...</p></div>
        </div>
    </div>

    <div id="plan_area" class="hidden-section">
        <div class="form-group">
            <div class="flex-group"><select id="plan_month" style="flex:1;"></select><select id="plan_half" style="flex:1.5;"><option value="1">전반기</option><option value="2">하반기</option></select></div>
            <button class="btn-act btn-move" style="margin-top:10px; padding:12px;" onclick="generatePlanForm()">📝 양식 펼치기</button>
        </div>
        <div id="plan_list_container" style="display:none; margin-top:20px; border-top:2px dashed #CCC; padding-top:20px;">
            <div class="time-input-wrap">
                <div class="flex-group"><select id="batch_loc" style="flex:1;"></select><select id="batch_start" style="flex:1;"></select><span>~</span><select id="batch_end" style="flex:1;"></select></div>
                <button onclick="applyBatchSettings()" style="width:100%; margin-top:8px; padding:10px; background:#333; color:white; border:none; border-radius:8px;">일괄 적용</button>
            </div>
            <div id="plan_rows"></div>
            <button class="btn-submit" onclick="submitBulkPlan()">🚀 제출하기</button>
        </div>
    </div>

    <div id="change_area" class="hidden-section">
        <div class="form-group"><label>📅 변경 대상 날짜</label><input type="date" id="change_target_date"></div>
        <div class="form-group"><select id="change_type" onchange="updateChangeUI()"><option value="시간 변경">시간 변경</option><option value="해설사 변경(대타)">해설사 변경</option><option value="계획 취소">계획 취소</option></select></div>
        <div id="change_ui_time" class="time-input-wrap"><div class="flex-group"><select id="change_time_start"></select><span>~</span><select id="change_time_end"></select></div></div>
        <div id="change_ui_guide" class="time-input-wrap" style="display:none;"><select id="change_target_guide"></select></div>
        <div id="change_ui_cancel" class="time-input-wrap" style="display:none;"><label style="color:#e74c3c;">휴무 전환</label></div>
        <div class="form-group"><textarea id="change_remarks" rows="2" placeholder="사유"></textarea></div>
        <button class="btn-submit" onclick="submitPlanChange()">요청하기</button>
    </div>

    <div id="my_plan_area" class="hidden-section">
        <div class="form-group"><label>📋 나의 활동계획</label><div id="my_plan_container"><p style="text-align:center; color:#999; padding:20px;">불러오는 중...</p></div></div>
    </div>

    <div id="approval_area" class="hidden-section">
        <div class="form-group">
            <div id="approval_header" class="approval-header" style="display:none;">
                <label><input type="checkbox" id="chk_all" class="chk-box" onclick="toggleAllApprovals(this)"> 전체 선택</label>
                <div style="display:flex; gap:5px;"><button class="btn-act btn-in" style="padding:8px; font-size:0.9rem; margin:0;" onclick="processBulkApp('승인완료')">승인</button><button class="btn-act btn-out" style="padding:8px; font-size:0.9rem; margin:0;" onclick="processBulkApp('반려')">반려</button></div>
            </div>
            <div id="pending_container"><p style="text-align:center; color:#999; padding:20px;">불러오는 중...</p></div>
        </div>
    </div>

    <div id="team_plan_area" class="hidden-section">
        <div class="form-group">
            <div class="flex-group"><select id="tp_month" style="flex:1;"></select><select id="tp_half" style="flex:1.5;"><option value="all">전체</option><option value="1">전반기</option><option value="2">하반기</option></select></div>
            <div class="flex-group"><select id="tp_loc" style="flex:1;"></select><input type="text" id="tp_name" placeholder="이름" style="flex:1;"></div>
            <button class="btn-submit" style="margin-top:5px; background-color:#3498db; color:white; border-radius:8px;" onclick="loadTeamPlans()">검색하기</button>
        </div>
        <div id="team_plan_container"><p style="text-align:center; color:#999; padding:20px;">조건 설정 후 검색</p></div>
    </div>

    <div id="report_area" class="hidden-section">
        <div class="form-group">
            <label>📑 출력할 보고서 선택</label>
            <select id="rep_type" style="margin-bottom:10px;">
                <option value="log">안내소 운영일지 (A4 서식고정)</option>
                <option value="plan">활동계획서 (준비중)</option>
                <option value="result">활동결과보고서 (준비중)</option>
            </select>
            <div class="flex-group">
                <select id="rep_year" style="flex:1;"><option value="2025">2025년</option><option value="2026" selected>2026년</option><option value="2027">2027년</option></select>
                <select id="rep_month" style="flex:1;"><option value="1">1월</option><option value="2">2월</option><option value="3">3월</option><option value="4">4월</option><option value="5">5월</option><option value="6">6월</option><option value="7">7월</option><option value="8">8월</option><option value="9">9월</option><option value="10">10월</option><option value="11">11월</option><option value="12">12월</option></select>
            </div>
            <select id="rep_half" style="margin-top:8px;"><option value="1">전반기 (1~15일)</option><option value="2">하반기 (16~말일)</option></select>
            <button class="btn-submit" style="margin-top:15px; background-color:#2c3e50; color:white; border-radius:8px; font-size:1.1rem; padding:15px;" onclick="generatePDF()">📄 PDF 변환 및 인쇄</button>
            <p style="font-size:0.8rem; color:#666; text-align:center; margin-top:10px;">인쇄 창이 뜨면 대상 프린터를 'PDF로 저장'으로 변경하세요.</p>
        </div>
    </div>

    <div id="admin_attendance_area" class="hidden-section">
        <div class="form-group"><label>📅 조회 날짜 선택</label><input type="date" id="admin_date_input" onchange="loadAdminAttendance()"></div>
        <div class="form-group"><button onclick="loadAdminAttendance()" style="padding:5px 10px; background:#333; color:white; border-radius:6px;">새로고침 🔄</button>
            <div id="admin_attendance_container"><p style="text-align:center; color:#999; padding:20px;">불러오는 중...</p></div>
        </div>
    </div>

    <div id="admin_log_area" class="hidden-section">
        <div class="form-group">
            <div class="flex-group"><input type="date" id="al_start_date" style="flex:1;"><span style="font-weight:bold;">~</span><input type="date" id="al_end_date" style="flex:1;"></div>
            <div class="flex-group"><select id="al_loc" style="flex:1;"></select><input type="text" id="al_name" placeholder="이름" style="flex:1;"></div>
            <button class="btn-submit" style="background-color:#3498db;" onclick="loadAdminLogs()">검색하기</button>
        </div>
        <div id="admin_log_container"><p style="text-align:center; color:#999; padding:20px;">검색해주세요.</p></div>
    </div>

    <div id="admin_plan_area" class="hidden-section">
        <div class="form-group">
            <div class="flex-group"><select id="ap_month" style="flex:1;"></select><select id="ap_half" style="flex:1.5;"><option value="all">전체</option><option value="1">전반기</option><option value="2">하반기</option></select></div>
            <div class="flex-group"><select id="ap_island" style="flex:1;" onchange="updateApLoc()"><option value="전체">전체 섬</option><option value="백령도">백령도</option><option value="대청도">대청도</option><option value="소청도">소청도</option></select><select id="ap_loc" style="flex:1;"><option value="">- 모든 안내소 -</option></select></div>
            <div class="form-group" style="margin-top:8px;"><input type="text" id="ap_name" placeholder="해설사 이름"></div>
            <button class="btn-submit" style="background-color:#3498db;" onclick="loadAdminPlans()">조회하기</button>
        </div>
        <div id="admin_plan_container"><p style="text-align:center; color:#999; padding:20px;">검색해주세요.</p></div>
    </div>

    <div id="admin_stats_area" class="hidden-section">

        else if (userIsland && userIsland.includes('소청')) myLocations = ['탑동', '분바위'];

        let allLocations = ['백령센터', '두무진', '용틀임바위', '진촌리 현무암', '콩돌해안', '사곶해변', '용기포신항', '선진동', '서풍받이', '농여해변', '옥죽동 해안사구', '탑동', '분바위', '거점센터'];

        function updateApLoc() {
            const island = document.getElementById('ap_island').value;
            let locs = [];

            else if (island === '대청도') locs = ['선진동', '서풍받이', '농여해변', '옥죽동 해안사구'];

        }

        const logTime = document.getElementById('log_time');
        if(logTime) {
            for(let i=6; i<=19; i++) {
                let start = i < 10 ? '0'+i : i; let end = (i+1) < 10 ? '0'+(i+1) : (i+1);
                logTime.add(new Option(`${start}:00 ~ ${end}:00`, `${start}:00 ~ ${end}:00`));
            }
        }

        if(document.getElementById('batch_start')) {
            document.getElementById('batch_start').innerHTML = timeOptionsHtml; document.getElementById('batch_end').innerHTML = timeOptionsHtml;
            document.getElementById('batch_start').value = "08:00"; document.getElementById('batch_end').value = "17:00";
            document.getElementById('change_time_start').innerHTML = timeOptionsHtml; document.getElementById('change_time_end').innerHTML = timeOptionsHtml;
        }

        const menuData = {
            '해설사': ['1. 출퇴근관리', '2. 안내소 운영일지 작성', '3. 활동계획서 작성', '4. 활동계획 변경', '5. 나의 활동계획 조회'],
            '조장': ['1. 출퇴근관리', '2. 안내소 운영일지 작성', '3. 출퇴근 및 활동 현황 조회', '4. 활동계획서 작성', '5. 활동계획 변경', '6. 활동계획 및 변경 승인', '7. 나의 활동계획 조회', '8. 조원 활동계획 조회', '9. 보고서 출력 (PDF)'],
            '관리자': ['1. 해설사 출퇴근 현황', '2. 해설사 활동 현황', '3. 활동계획서 조회', '4. 통계']
        };

        const container = document.getElementById('menu_container');
        (menuData[userRole] || menuData['해설사']).forEach(m => {
            const d = document.createElement('div');
            d.className = 'menu-card'; d.innerText = m;
            d.onclick = () => {
                document.querySelectorAll('.hidden-section').forEach(el => el.style.display = 'none');
                
                if(m.includes('출퇴근관리') && userRole !== '관리자') { document.getElementById('attendance_area').style.display = 'block'; setCurrentTimeInput(); }
                else if(m.includes('운영일지 작성')) document.getElementById('log_area').style.display = 'block';
                else if(m === '3. 출퇴근 및 활동 현황 조회') { document.getElementById('status_area').style.display = 'block'; loadDailyStatus(); }
                else if(m === '4. 활동계획서 작성' || (userRole === '해설사' && m === '3. 활동계획서 작성')) document.getElementById('plan_area').style.display = 'block';
                else if(m.includes('활동계획 변경')) { document.getElementById('change_area').style.display = 'block'; loadGuideList(); }
                else if(m.includes('변경 승인')) { document.getElementById('approval_area').style.display = 'block'; loadPendingRequests(); }
                else if(m.includes('나의 활동계획 조회')) { document.getElementById('my_plan_area').style.display = 'block'; loadMyPlans(); }
                else if(m.includes('조원 활동계획 조회')) { document.getElementById('team_plan_area').style.display = 'block'; loadTeamPlans(); }
                else if(m.includes('보고서 출력')) document.getElementById('report_area').style.display = 'block';
                else if(m === '1. 해설사 출퇴근 현황') { document.getElementById('admin_attendance_area').style.display = 'block'; loadAdminAttendance(); }
                else if(m === '2. 해설사 활동 현황') { document.getElementById('admin_log_area').style.display = 'block'; loadAdminLogs(); }
                else if(m === '3. 활동계획서 조회') { document.getElementById('admin_plan_area').style.display = 'block'; loadAdminPlans(); }
                else if(m === '4. 통계') { document.getElementById('admin_stats_area').style.display = 'block'; loadStatistics(); }
            };
            container.appendChild(d);
        });

        async function syncMyStatus() {
            if(userRole === '관리자') return;
            try {
                const res = await fetch(`${API_BASE}/get_my_attendance?name=${encodeURIComponent(userName)}`);
                if(res.ok) {
                    const data = await res.json();
                    currentLoc = data.loc; localStorage.setItem("current_location", currentLoc); updateCurrentLocBadge();
                    if(data.in_time) document.getElementById('in_time_display').innerText = `기록됨: ${data.in_time}`;
                    if(data.out_time) document.getElementById('out_time_display').innerText = `기록됨: ${data.out_time}`;
                }
            } catch (e) {}
        }

        async function sendAction(action) {
            const loc = document.getElementById('location_select').value;
            const inputTime = document.getElementById('action_time_input').value; 
            if(!inputTime) return;
            if(!confirm(`[${inputTime}] 기준으로 [${loc}]에서 [${action}] 기록하시겠습니까?`)) return;
            try {
                const res = await fetch(`${API_BASE}/record`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name: userName, island: userIsland, role: userRole, action: action, location: loc, action_time: inputTime })
                });
                if(res.ok) {
                    if (action === '출근' || action === '이동') { currentLoc = loc; updateCurrentLocBadge(); } 
                    else if (action === '퇴근') { currentLoc = "미출근"; updateCurrentLocBadge(); }
                    if (action === '출근') document.getElementById('in_time_display').innerText = `기록됨: ${inputTime}`;
                    else if (action === '이동') document.getElementById('move_time_display').innerText = `기록됨: ${inputTime}`;
                    else if (action === '퇴근') document.getElementById('out_time_display').innerText = `기록됨: ${inputTime}`;
                    alert(action + " 완료!");
                } else alert("기록 실패!");
            } catch (e) {}
        }

        async function submitLog() {
            const coSelectValue = document.getElementById('log_co').value;
            const isCoInitiator = coSelectValue === 'O'; let coCommentaryValue = isCoInitiator ? document.getElementById('log_co_guide').value : (coSelectValue === '○' ? '○' : 'X');
            if(!confirm("운영일지를 저장하시겠습니까?")) return;
            try {
                const res = await fetch(`${API_BASE}/log_operation`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name: userName, island: userIsland, role: userRole, log_location: document.getElementById('log_location_select').value, target_time: document.getElementById('log_time').value, visitors: isCoInitiator ? 0 : parseInt(document.getElementById('log_visitors').value), listeners: isCoInitiator ? 0 : parseInt(document.getElementById('log_listeners').value), count: isCoInitiator ? 0 : parseInt(document.getElementById('log_count').value), co_commentary: coCommentaryValue, remarks: document.getElementById('log_remarks').value })
                });
                if(res.ok) { alert("저장되었습니다."); document.getElementById('log_area').style.display = 'none'; }
            } catch (e) {}
        }

        async function loadDailyStatus() {
            const container = document.getElementById('status_container');
            let targetDate = document.getElementById('status_date_input').value;
            if(!targetDate) {
                targetDate = new Date(new Date().getTime() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0];
                document.getElementById('status_date_input').value = targetDate;
            }
            container.innerHTML = '<p style="text-align:center; color:#999;">데이터를 불러오는 중입니다...</p>';
            try {
                const res = await fetch(`${API_BASE}/get_daily_status?island=${encodeURIComponent(userIsland)}&target_date=${targetDate}`);
                const data = await res.json();
                let html = ''; let summary = data.log_summary;
                html += `<div style="background:#fff3e0; padding:15px; border-radius:12px; margin-bottom:15px; border:1px solid #ffe0b2;"><div style="font-size:0.9rem; font-weight:800; color:#e65100; margin-bottom:10px;">📝 ${data.target_date} 실적 총합 (일지 ${summary.total_logs}건)</div><div style="display:flex; justify-content:space-between; text-align:center;"><div style="flex:1;"><div style="font-size:0.8rem; color:#d35400;">탐방객</div><div style="font-weight:800; font-size:1.1rem; color:#b33939;">${summary.total_visitors}명</div></div><div style="flex:1;"><div style="font-size:0.8rem; color:#d35400;">청취자</div><div style="font-weight:800; font-size:1.1rem; color:#b33939;">${summary.total_listeners}명</div></div><div style="flex:1;"><div style="font-size:0.8rem; color:#d35400;">해설횟수</div><div style="font-weight:800; font-size:1.1rem; color:#b33939;">${summary.total_count}회</div></div></div></div>`;
                if(Object.keys(data.attendance).length === 0) { html += `<p style="text-align:center; color:#999; padding:20px;">${data.target_date}에 기록된 활동이 없습니다.</p>`; } else {
                    for (const [loc, users] of Object.entries(data.attendance)) {
                        let headerColor = loc === '퇴근' ? '#95a5a6' : '#3498db';
                        html += `<div style="background:white; border: 1px solid #E5E5E5; border-radius: 12px; margin-bottom: 12px; overflow:hidden;"><div style="background:${headerColor}; color:white; padding:8px 15px; font-weight:bold; font-size:0.95rem;">📍 ${loc} (${users.length}명)</div><div style="padding:10px 15px;">`;
                        users.forEach(u => { 
                            let outStr = u.out_time ? u.out_time : '<span style="color:#e74c3c;">미퇴근</span>';
                            html += `<div style="margin-bottom:12px; border-bottom:1px dashed #eee; padding-bottom:10px;"><div style="font-weight:800; color:#333; margin-bottom:6px;">${u.name}</div><div style="display:flex; justify-content:space-between; font-size:0.85rem; color:#555; background:#f8f9fa; padding:8px; border-radius:6px;"><span>🟢 출근: <b>${u.in_time}</b></span><span>🔴 퇴근: <b>${outStr}</b></span></div></div>`; 
                        });
                        html += `</div></div>`;
                    }
                }
                container.innerHTML = html;
            } catch (e) {}
        }

        function generatePlanForm() {
            const month = parseInt(document.getElementById('plan_month').value); const half = parseInt(document.getElementById('plan_half').value); const year = new Date().getFullYear();
            let startDay = half === 1 ? 1 : 16; let endDay = half === 1 ? 15 : new Date(year, month, 0).getDate(); 
            const container = document.getElementById('plan_rows'); container.innerHTML = ''; const days = ['일', '월', '화', '수', '목', '금', '토'];
            for(let i = startDay; i <= endDay; i++) {
                let d = new Date(year, month-1, i); let dayIdx = d.getDay(); let dateStr = `${month}월 ${i}일(${days[dayIdx]})`; let isWeekend = dayIdx === 0 || dayIdx === 6 ? 'color:#e74c3c;' : '';
                container.innerHTML += `<div class="plan-row" data-date="${year}-${month}-${i}" data-day="${dayIdx}"><div class="plan-date-label"><span style="${isWeekend}">${dateStr}</span><span class="calc-hours">0시간</span></div><div class="flex-group"><select class="p-loc" style="flex:1;" onchange="handleRowChange(this)">${locOptionsHtml}</select><select class="p-start" style="flex:1;" onchange="handleRowChange(this)">${timeOptionsHtml}</select><span>~</span><select class="p-end" style="flex:1;" onchange="handleRowChange(this)">${timeOptionsHtml}</select></div><input type="text" class="p-remarks" placeholder="비고 (선택사항)"></div>`;
            }
            document.getElementById('plan_list_container').style.display = 'block'; applyBatchSettings(); 
        }

        function applyBatchSettings() {
            const loc = document.getElementById('batch_loc').value; const start = document.getElementById('batch_start').value; const end = document.getElementById('batch_end').value;
            document.querySelectorAll('.plan-row').forEach(row => { row.querySelector('.p-loc').value = loc; row.querySelector('.p-start').value = start; row.querySelector('.p-end').value = end; calcRowHours(row); });
        }
        function handleRowChange(elem) { calcRowHours(elem.closest('.plan-row')); }
        function calcRowHours(row) {
            const loc = row.querySelector('.p-loc').value; const start = row.querySelector('.p-start').value; const end = row.querySelector('.p-end').value; const hoursSpan = row.querySelector('.calc-hours');
            if (loc === '휴무') { hoursSpan.innerText = "휴무"; hoursSpan.className = "calc-hours"; row.querySelector('.p-start').disabled = true; row.querySelector('.p-end').disabled = true; return; }
            row.querySelector('.p-start').disabled = false; row.querySelector('.p-end').disabled = false;
            let sHour = parseInt(start.split(':')[0]); let eHour = parseInt(end.split(':')[0]); let diff = (eHour - sHour) >= 5 ? (eHour - sHour) - 1 : (eHour - sHour);
            if ((eHour-sHour) <= 0) { hoursSpan.innerText = "시간 오류"; hoursSpan.className = "calc-hours over"; } else { hoursSpan.innerText = `${diff}시간 (식사제외)`; hoursSpan.className = diff > 8 ? "calc-hours over" : "calc-hours"; }
        }

        async function submitBulkPlan() {
            let plans = []; let isValid = true; let totalRestDays = 0; let currentWeekWorkDays = 0; let weekWarningTriggered = false; let requiresApproval = false;
            document.querySelectorAll('.plan-row').forEach(row => {
                let dayIdx = parseInt(row.getAttribute('data-day'));
                let loc = row.querySelector('.p-loc').value; let sTime = row.querySelector('.p-start').value; let eTime = row.querySelector('.p-end').value;
                let rawDiff = parseInt(eTime.split(':')[0]) - parseInt(sTime.split(':')[0]);
                
                if (dayIdx === 0) currentWeekWorkDays = 0;
                if (loc !== '휴무') {
                    if(rawDiff <= 0) isValid = false; 
                    currentWeekWorkDays++;
                    if ((rawDiff >= 5 ? rawDiff-1 : rawDiff) > 8) requiresApproval = true;
                } else { totalRestDays++; }
                if (dayIdx === 6 || row === document.querySelectorAll('.plan-row')[document.querySelectorAll('.plan-row').length - 1]) {
                    if (currentWeekWorkDays >= 7) weekWarningTriggered = true;
                }
                plans.push({ plan_date: row.querySelector('.plan-date-label span').innerText, location: loc === '휴무' ? '-' : loc, activity_status: loc === '휴무' ? '휴무' : `${sTime}~${eTime} (${rawDiff >= 5 ? rawDiff-1 : rawDiff}시간)`, remarks: row.querySelector('.p-remarks').value, status: (loc !== '휴무' && (rawDiff >= 5 ? rawDiff-1 : rawDiff) > 8) ? "초과승인대기" : "승인대기" });
            });
            if (!isValid) { alert("시간 설정이 잘못된 날짜가 있습니다."); return; }
            if (totalRestDays < 5 && !confirm(`경고: 전/하반기 15일 중 5일 이상 휴무가 권장됩니다.\n이대로 제출하시겠습니까?`)) return;
            
            let confirmMsg = `활동계획을 제출하시겠습니까?`;
            if(requiresApproval) confirmMsg += `\n※ 8시간 초과 근무 포함되어 추가 승인이 필요합니다.`;
            if(!confirm(confirmMsg)) return;
            try {
                const res = await fetch(`${API_BASE}/submit_plan_bulk`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name: userName, island: userIsland, plans: plans }) });
                if(res.ok) { alert("제출되었습니다."); document.getElementById('plan_list_container').style.display = 'none'; }
            } catch (e) {}
        }

        function updateChangeUI() {
            const type = document.getElementById('change_type').value;
            document.getElementById('change_ui_time').style.display = type === '시간 변경' ? 'block' : 'none';
            document.getElementById('change_ui_guide').style.display = type === '해설사 변경(대타)' ? 'block' : 'none';
            document.getElementById('change_ui_cancel').style.display = type === '계획 취소' ? 'block' : 'none';
        }

            const select = document.getElementById('change_target_guide');
            try {
                const res = await fetch(`${API_BASE}/get_guides?island=${encodeURIComponent(userIsland)}&exclude_name=${encodeURIComponent(userName)}`);
                if(res.ok) { const data = await res.json(); select.innerHTML = data.guides.length > 0 ? data.guides.map(g => `<option value="${g}">${g} 해설사</option>`).join('') : '<option value="">동료가 없습니다.</option>'; }
            } catch (e) {}
        }

        async function submitPlanChange() {

        async function generatePDF() {

            const half = document.getElementById('rep_half').value;

            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/get_report_data?island=${encodeURIComponent(userIsland)}&year=${year}&month=${month}`);
                const data = await res.json();
                
                let html = '';
                let printArea = document.getElementById('print_area');

                if(type === 'log') {
                    let dailyData = data.daily_data;
                    let sortedDates = Object.keys(dailyData).sort();
                    
                    if(half === '1') sortedDates = sortedDates.filter(d => parseInt(d.split('-')[2]) <= 15);
                    else sortedDates = sortedDates.filter(d => parseInt(d.split('-')[2]) > 15);

                    if(sortedDates.length === 0) { 
                        alert("해당 기간의 운영일지 기록이 없습니다."); 
                        btn.innerText = "📄 PDF 변환 및 인쇄"; btn.disabled = false; return; 
                    }

                    // 12시간 체제로 위아래 추가
                    const times = [
                        "07:00~08:00",
                        "08:00~09:00", "09:00~10:00", "10:00~11:00", "11:00~12:00",
                        "12:00~13:00", "13:00~14:00", "14:00~15:00", "15:00~16:00",
                        "16:00~17:00", "17:00~18:00", 
                        "18:00~19:00"
                    ];

                    sortedDates.forEach(dateStr => {
                        let locs = dailyData[dateStr];
                        let dObj = new Date(dateStr);
                        let dateFormatted = `(${dObj.getFullYear()}년 ${dObj.getMonth()+1}월 ${dObj.getDate()}일)`;

                        for (const [loc, info] of Object.entries(locs)) {
                            
                            // 1. 안내소 단어 싹 지우기
                            let displayLoc = loc.replace(/ 안내소|안내소/g, '').trim();
                            
                            let guideRows = '';
                            for(let i=0; i<4; i++) {
                                if(info.guides && info.guides[i]) {
                                    let g = info.guides[i];
                                    let tIn = g.in || '';
                                    let tOut = g.out || '';
                                    let timeStr = (tIn || tOut) ? `${tIn} ~ ${tOut}` : '';
                                    guideRows += `<tr class="row-guide"><td>${g.name}</td><td colspan="2">${timeStr}</td></tr>`;
                                } else {
                                    guideRows += `<tr class="row-guide"><td></td><td colspan="2"></td></tr>`;
                                }
                            }

                            let logRows = '';
                            let totalV = 0, totalL = 0, totalC = 0;
                            let remarkSum = '';

                            times.forEach(t => {
                                let log = info.logs ? info.logs.find(x => x.time && x.time.replace(/\s/g,'').substring(0,2) === t.substring(0,2)) : null;

                                if(log) {
                                    totalV += parseInt(log.visitors||0);
                                    totalL += parseInt(log.listeners||0);
                                    totalC += parseInt(log.count||0);
                                    if(log.remarks) remarkSum += log.remarks + " ";

                                    logRows += `
                                        <tr class="row-log">
                                            <td>${t}</td>
                                            <td>${log.visitors || ''}</td>
                                            <td>${log.listeners || ''}</td>
                                            <td>${log.count || ''}</td>
                                            <td></td>
                                            <td></td>
                                            <td style="text-align:left; padding-left:5px;">${log.remarks || ''}</td>
                                        </tr>
                                    `;
                                } else {
                                    logRows += `<tr class="row-log"><td>${t}</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>`;
                                }
                            });

                            html += `
                                <div class="print-page">
                                    <div class="print-top-left">【서식 3】 지질공원 안내소 운영일지</div>
                                    <div class="print-main-title">지질공원 안내소 운영일지</div>
                                    <div class="print-date">${dateFormatted}</div>

                                    <table class="fixed-table">
                                        <tr class="row-loc">
                                            <th class="t1-col1">안내소</th>
                                            <td class="t1-col2" style="font-size:12pt; font-weight:bold;">${displayLoc}</td>
                                            <th class="t1-col3">지시사항</th>
                                            <td class="t1-col4" style="text-align:left;"></td>
                                        </tr>
                                        <tr class="row-guide-header">
                                            <th rowspan="5" class="t1-col1">해설사</th>
                                            <th class="t1-col2">성명</th>
                                            <th colspan="2">활동 시간</th>
                                        </tr>
                                        ${guideRows}
                                    </table>

                                    <div class="print-sub-title">■ 운영일지</div>
                                    <table class="fixed-table">
                                        <tr class="row-log-header">
                                            <th class="t2-col1">시간</th>
                                            <th class="t2-col2">지질명소<br>탐방객(명)</th>
                                            <th class="t2-col3">해설<br>청취자(명)</th>
                                            <th class="t2-col4">해설<br>횟수(회)</th>
                                            <th class="t2-col5">교육<br>청취자(명)</th>
                                            <th class="t2-col6">교육<br>횟수(회)</th>
                                            <th class="t2-col7" style="font-size:9pt; line-height:1.2;">비고(환경정비,<br>시설점검 등)</th>
                                        </tr>
                                        ${logRows}
                                        <tr class="row-sum">
                                            <th>합계</th>
                                            <td>${totalV || ''}</td>
                                            <td>${totalL || ''}</td>
                                            <td>${totalC || ''}</td>
                                            <td></td>
                                            <td></td>
                                            <td></td>
                                        </tr>
                                        <tr class="row-remark">
                                            <th>특이사항</th>
                                            <td colspan="6">${remarkSum}</td>
                                        </tr>
                                    </table>

                                    <div class="signature-box">
                                        조장 확인<span style="margin-left: 4mm;">(서명)</span>
                                        <span style="margin-left: 5mm;">면 팀장 확인</span><span style="margin-left: 4mm;">(서명)</span>
                                    </div>
                                </div>
                            `;
                        }
                    });
                } else {
                    alert("활동계획서와 활동결과보고서는 현재 개발 진행 중입니다. '안내소 운영일지'를 선택해주세요."); 
                    btn.innerText = "📄 PDF 변환 및 인쇄"; btn.disabled = false; return;
                }

                printArea.innerHTML = html;
                btn.innerText = "📄 PDF 변환 및 인쇄";
                btn.disabled = false;
                
                window.print();
                
            } catch(e) {
                alert("보고서 생성 중 오류가 발생했습니다.");
                btn.innerText = "📄 PDF 변환 및 인쇄";
                btn.disabled = false;
            }
        }

        function logout() { if(confirm("로그아웃 하시겠습니까?")) { localStorage.clear(); location.href = "index.html"; } }

        syncMyStatus();
    </script>
</body>
</html>
